<!DOCTYPE html>
<html lang="vi">
<!-- v2 -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>opus-vita</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #10B981; --green-d: #059669; --green-l: #D1FAE5;
  --blue: #3B82F6; --amber: #F59E0B; --purple: #8B5CF6; --red: #EF4444;
  --bg: #F3F4F6; --card: #fff; --text: #111827; --muted: #6B7280; --faint: #9CA3AF; --border: #E5E7EB;
  --r: 14px;
}
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); }
#app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--bg); }

/* ── Topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 12px 14px 0;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
}
.tb-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.tb-row1 h1 { font-size: 17px; font-weight: 800; }
.sync-btn { font-size: 12px; padding: 6px 11px; background: var(--green-l); color: var(--green-d); border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: inherit; }

/* module tabs */
.mod-tabs { display: flex; }
.mtab { flex: 1; padding: 9px 4px 10px; text-align: center; font-size: 12px; font-weight: 700; border: none; background: none; cursor: pointer; font-family: inherit; color: var(--faint); border-bottom: 2.5px solid transparent; transition: color .18s, border-color .18s; }
.mtab.active { color: var(--green); border-bottom-color: var(--green); }

/* range tabs */
.range-row { display: flex; gap: 6px; padding: 8px 0 10px; }
.rtab { flex: 1; padding: 6px; text-align: center; font-size: 11px; font-weight: 600; border-radius: 7px; border: none; background: var(--bg); color: var(--muted); cursor: pointer; font-family: inherit; }
.rtab.active { background: var(--green); color: #fff; }

/* ── Content ── */
.content { padding: 12px 12px 24px; }

/* ── Cards ── */
.card { background: var(--card); border-radius: var(--r); padding: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 10px; }
.card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--faint); margin-bottom: 10px; }

/* ── Stats ── */
.stats { display: grid; gap: 7px; margin-bottom: 10px; }
.stats.col4 { grid-template-columns: repeat(4,1fr); }
.stats.col3 { grid-template-columns: repeat(3,1fr); }
.stat { background: var(--card); border-radius: 12px; padding: 10px 6px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.stat .v { font-size: 17px; font-weight: 900; line-height: 1.1; }
.stat .l { font-size: 9px; color: var(--muted); margin-top: 3px; font-weight: 600; }

/* ── Chart ── */
.chart-wrap { height: 140px; }
canvas { display: block; }

/* ── Metric mini ── */
.mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.mm { background: var(--card); border-radius: 12px; padding: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.mm .ico { font-size: 18px; margin-bottom: 5px; }
.mm .val { font-size: 17px; font-weight: 800; }
.mm .sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.pbar { height: 4px; background: var(--bg); border-radius: 2px; margin-top: 7px; }
.pfill { height: 100%; border-radius: 2px; }

.stitle { font-size: 13px; font-weight: 700; margin: 14px 0 8px; }

/* ── Meal items ── */
.mi { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.mi:last-child { border-bottom: none; }
.mi-ico { font-size: 17px; flex-shrink: 0; }
.mi-info { flex: 1; min-width: 0; }
.mi-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mi-mac  { font-size: 10px; color: var(--muted); margin-top: 2px; }
.mi-kcal { font-size: 13px; font-weight: 800; color: var(--green); flex-shrink: 0; }

/* ── History items ── */
.hi { display: flex; align-items: center; gap: 11px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.hi:last-child { border-bottom: none; }
.hi-ico { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.hi-info { flex: 1; min-width: 0; }
.hi-title { font-size: 13px; font-weight: 600; }
.hi-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
.hi-extra { font-size: 10px; color: var(--muted); margin-top: 1px; }
.hi-val   { font-size: 14px; font-weight: 800; flex-shrink: 0; }

/* ── Weight delta ── */
.wdelta { font-size: 12px; font-weight: 700; padding: 2px 7px; border-radius: 6px; display: inline-block; margin-top: 3px; }
.dn { background: #D1FAE5; color: #065F46; }
.up { background: #FEE2E2; color: #991B1B; }
.fl { background: var(--bg); color: var(--muted); }

/* ── Loading / error ── */
.loading { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }
.spin { font-size: 26px; display: block; margin-bottom: 10px; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.err { background: #FEF2F2; border-left: 3px solid var(--red); border-radius: 10px; padding: 14px; font-size: 13px; color: #991B1B; line-height: 1.6; }

/* ── Day accordion ── */
.day-acc { background: var(--card); border-radius: 12px; margin-bottom: 7px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
.day-acc summary { list-style: none; cursor: pointer; padding: 12px 14px; display: flex; align-items: center; gap: 10px; user-select: none; -webkit-tap-highlight-color: transparent; }
.day-acc summary::-webkit-details-marker { display: none; }
.day-acc summary:active { background: var(--bg); }
.da-date { font-size: 13px; font-weight: 700; flex: 1; }
.da-meta { font-size: 11px; color: var(--muted); }
.da-kcal { font-size: 14px; font-weight: 800; color: var(--green); }
.da-chev { font-size: 13px; color: var(--faint); transition: transform .2s; }
.day-acc[open] .da-chev { transform: rotate(180deg); }
.da-body { padding: 0 14px 12px; border-top: 1px solid var(--border); }

/* ── Toast ── */
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-80px); background: #111827; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 999; transition: transform .3s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<!-- PAT Screen -->
<div id="pat-screen" style="display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--bg)">
  <div style="font-size:52px;margin-bottom:16px">🌿</div>
  <div style="font-size:22px;font-weight:800;margin-bottom:6px">opus-vita</div>
  <div style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px">Nhập GitHub PAT để truy cập dữ liệu</div>
  <div style="width:100%;background:var(--card);border-radius:var(--r);padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px">
    <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:7px;display:block">GitHub PAT</label>
    <input id="pat-input" type="password" placeholder="github_pat_..." style="width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none">
    <p style="font-size:11px;color:var(--faint);margin-top:8px;line-height:1.6">Scope cần: <strong>Contents = Read-only</strong> cho repo <code>ai-project-opus</code></p>
  </div>
  <button onclick="savePat()" style="width:100%;padding:14px;background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">Kết nối →</button>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-row1">
      <h1>🌿 <span id="streak-badge"></span></h1>
      <div style="display:flex;gap:6px">
        <button class="sync-btn" onclick="reload()">↻ Sync</button>
        <button onclick="resetPat()" style="font-size:12px;padding:6px 10px;background:var(--bg);color:var(--muted);border:none;border-radius:8px;cursor:pointer;font-family:inherit">🔑</button>
      </div>
    </div>
    <div class="mod-tabs">
      <button class="mtab active" id="mt-health"  onclick="showTab('health')">🌿 Sức khỏe</button>
      <button class="mtab"        id="mt-workout" onclick="showTab('workout')">💪 Tập luyện</button>
      <button class="mtab"        id="mt-finance" onclick="showTab('finance')">💰 Tài chính</button>
    </div>
    <div class="range-row">
      <button class="rtab active" onclick="setRange(7,this)">7 ngày</button>
      <button class="rtab"        onclick="setRange(14,this)">14 ngày</button>
      <button class="rtab"        onclick="setRange(30,this)">30 ngày</button>
      <button class="rtab"        onclick="setRange(90,this)">3 tháng</button>
    </div>
  </div>
  <div class="content" id="content">
    <div class="loading"><span class="spin">🌿</span>Đang tải...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Config ──
const DATA_REPO   = 'lechihuy-droid/ai-project-opus';
const DATA_BRANCH = 'main';

let PAT = localStorage.getItem('ov_pat') || '';
let currentRange = 7;
let currentTab   = 'health';
let cHealth = [], cWorkout = [], cFinance = [];
let healthIdx = [], workoutIdx = [], financeIdx = [];

// ── Targets ──
const TARGET = { kcal: 2200, protein: 130, water_ml: 2000, steps: 8000, sleep: 7.5 };

// ── PAT setup ──
function checkPat() {
  if (!PAT) {
    document.getElementById('pat-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return false;
  }
  return true;
}
function savePat() {
  const v = document.getElementById('pat-input').value.trim();
  if (!v) return;
  PAT = v;
  localStorage.setItem('ov_pat', PAT);
  document.getElementById('pat-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  reload();
}
function resetPat() {
  localStorage.removeItem('ov_pat');
  PAT = '';
  document.getElementById('pat-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── Fetch from private repo via GitHub API ──
async function ghGet(path) {
  const url = `https://api.github.com/repos/${DATA_REPO}/contents/${path}?ref=${DATA_BRANCH}`;
  const r = await fetch(url, {
    headers: { 'Authorization': `Bearer ${PAT}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!r.ok) { if (r.status===404) return null; throw new Error(`${r.status}: ${path}`); }
  const d = await r.json();
  const bytes = Uint8Array.from(atob(d.content.replace(/\n/g,'')), c => c.charCodeAt(0));
  return JSON.parse(new TextDecoder().decode(bytes));
}

// ── Data loading ──
function datesInRange(n) {
  return Array.from({length:n}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-i);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });
}
async function loadModule(prefix, range) {
  const idx = await ghGet(`${prefix}/index.json`);
  if (!idx?.length) return { rows: [], idx: [] };
  const dates = datesInRange(range).filter(d => idx.includes(d));
  const rows  = await Promise.all(dates.map(d => ghGet(`${prefix}/${d}.json`)));
  return {
    rows: rows.filter(Boolean).sort((a,b) => b.date.localeCompare(a.date)),
    idx: [...idx].sort((a,b) => b.localeCompare(a))
  };
}

// ── Nav ──
function setRange(n, btn) {
  currentRange = n;
  document.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  reload();
}
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.mtab').forEach(b => b.classList.remove('active'));
  document.getElementById('mt-'+tab).classList.add('active');
  renderContent();
}

// ── Reload ──
async function reload() {
  document.getElementById('content').innerHTML =
    '<div class="loading"><span class="spin">🌿</span>Đang tải...</div>';
  try {
    const [h, w, f] = await Promise.all([
      loadModule('health-data',  currentRange),
      loadModule('workout-data', currentRange).catch(()=>({rows:[],idx:[]})),
      loadModule('finance-data', currentRange).catch(()=>({rows:[],idx:[]}))
    ]);
    cHealth = h.rows;  healthIdx  = h.idx;
    cWorkout = w.rows; workoutIdx = w.idx;
    cFinance = f.rows; financeIdx = f.idx;
    renderStreakBadge();
    renderContent();
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="err">❌ Lỗi tải dữ liệu:<br><strong>${e.message}</strong><br><br>Kiểm tra PAT hoặc kết nối mạng. <span style="text-decoration:underline;cursor:pointer" onclick="resetPat()">Đổi PAT</span></div>`;
  }
}
function renderContent() {
  const el = document.getElementById('content');
  if (currentTab==='health')  { el.innerHTML=renderHealth(cHealth);  setTimeout(()=>drawHealth(cHealth),30); }
  if (currentTab==='workout') { el.innerHTML=renderWorkout(cWorkout);setTimeout(()=>drawWorkout(cWorkout),30); }
  if (currentTab==='finance') { el.innerHTML=renderFinance(cFinance);setTimeout(()=>drawFinance(cFinance),30); }
}

// ══ TAB 1 — Sức khỏe ══
function renderHealth(logs) {
  if (!logs.length) return `<div class="loading">😶 Chưa có dữ liệu sức khỏe<br><span style="font-size:12px;color:var(--faint);margin-top:8px;display:block">Gửi ảnh bữa ăn cho Claude để bắt đầu log</span></div>
    <button onclick="debugFetch()" style="display:block;margin:8px auto;padding:8px 16px;background:#E5E7EB;border:none;border-radius:8px;font-size:12px;cursor:pointer">🔍 Test API</button>
    <pre id="dbg-out" style="display:none;background:#F9FAFB;border-radius:8px;padding:12px;font-size:11px;white-space:pre-wrap;margin:0 0 16px"></pre>`;
  const avgCal   = avg(logs, l => totalKcal(l));
  const avgSleep = avg(logs, l => l.sleep_hours||0);
  const avgSteps = avg(logs, l => l.steps||0);
  const withW    = logs.filter(l => l.weight_kg>0);
  const latest   = withW[0], first = withW[withW.length-1];
  const delta    = first&&latest ? +(latest.weight_kg-first.weight_kg).toFixed(1) : null;
  const dc       = delta>0?'up':delta<0?'dn':'fl';

  const foodSections = logs.map((l,i) => {
    const kcal = totalKcal(l);
    const mealCount = (l.meals||[]).length;
    const rows = (l.meals||[]).flatMap(m => (m.items||[]).map(it => {
      const ico = {receipt:'🧾',bill:'🛒'}[m.source]||'🍽️';
      return `<div class="mi">
        <div class="mi-ico">${ico}</div>
        <div class="mi-info">
          <div class="mi-name">${it.name}</div>
          <div class="mi-mac">${it.grams}g · P:${it.protein}g C:${it.carb}g F:${it.fat}g</div>
        </div>
        <div class="mi-kcal">${it.kcal}</div>
      </div>`;
    })).join('');
    return `<details class="day-acc" ${i===0?'open':''}>
      <summary>
        <span class="da-date">${fmt(l.date)}</span>
        <span class="da-meta">${mealCount} bữa</span>
        <span class="da-kcal">${kcal} kcal</span>
        <span class="da-chev">▾</span>
      </summary>
      <div class="da-body">${rows||'<div style="color:var(--faint);font-size:13px;padding:8px 0">Chưa có bữa nào</div>'}</div>
    </details>`;
  }).join('');

  return `
    ${renderTodayCard(logs)}
    ${renderWeeklySummary(logs)}
    <div class="stats col4">
      <div class="stat"><div class="v" style="color:var(--red)">${Math.round(avgCal)}</div><div class="l">avg kcal</div></div>
      <div class="stat"><div class="v" style="color:var(--purple)">${avgSleep.toFixed(1)}h</div><div class="l">avg ngủ</div></div>
      <div class="stat"><div class="v" style="color:var(--amber)">${(avgSteps/1000).toFixed(1)}k</div><div class="l">avg bước</div></div>
      <div class="stat"><div class="v" style="color:var(--green)">${latest?latest.weight_kg:'--'}</div><div class="l">kg</div></div>
    </div>
    <div class="card">
      <div class="card-label">Calo mỗi ngày (kcal)</div>
      <div class="chart-wrap"><canvas id="c-cal"></canvas></div>
    </div>
    <div class="card">
      <div class="card-label">Macro trung bình / ngày</div>
      <div style="display:flex;gap:8px;text-align:center">
        <div style="flex:1"><div style="font-size:21px;font-weight:900;color:var(--blue)">${Math.round(avg(logs,l=>totalMacro(l,'protein')))}g</div><div style="font-size:11px;color:var(--muted)">Protein</div></div>
        <div style="flex:1"><div style="font-size:21px;font-weight:900;color:var(--amber)">${Math.round(avg(logs,l=>totalMacro(l,'carb')))}g</div><div style="font-size:11px;color:var(--muted)">Carb</div></div>
        <div style="flex:1"><div style="font-size:21px;font-weight:900;color:var(--purple)">${Math.round(avg(logs,l=>totalMacro(l,'fat')))}g</div><div style="font-size:11px;color:var(--muted)">Fat</div></div>
      </div>
    </div>
    <div class="mgrid">
      <div class="mm"><div class="ico">💧</div><div class="val">${(avg(logs,l=>l.water_ml||0)/1000).toFixed(1)}L</div><div class="sub">avg / ngày</div><div class="pbar"><div class="pfill" style="background:var(--blue);width:${pc(avg(logs,l=>l.water_ml||0),2000)}%"></div></div></div>
      <div class="mm"><div class="ico">👟</div><div class="val">${(avgSteps/1000).toFixed(1)}k</div><div class="sub">avg / ngày</div><div class="pbar"><div class="pfill" style="background:var(--amber);width:${pc(avgSteps,8000)}%"></div></div></div>
      <div class="mm"><div class="ico">😴</div><div class="val">${avgSleep.toFixed(1)}h</div><div class="sub">avg / đêm</div><div class="pbar"><div class="pfill" style="background:var(--purple);width:${pc(avgSleep,8)}%"></div></div></div>
      <div class="mm">
        <div class="ico">⚖️</div>
        <div class="val">${latest?latest.weight_kg+'kg':'--'}</div>
        ${delta!==null?`<div class="wdelta ${dc}">${delta>0?'+':''}${delta} kg</div>`:'<div class="sub">chưa có data</div>'}
      </div>
    </div>
    ${withW.length>1?`<div class="card"><div class="card-label">Cân nặng (kg)</div><div class="chart-wrap"><canvas id="c-weight"></canvas></div></div>`:''}
    <div class="card"><div class="card-label">Giấc ngủ (giờ)</div><div class="chart-wrap"><canvas id="c-sleep"></canvas></div></div>
    <div class="card"><div class="card-label">Bước chân (nghìn)</div><div class="chart-wrap"><canvas id="c-steps"></canvas></div></div>
    <div class="stitle">🍽️ Bữa ăn gần đây</div>
    ${foodSections}`;
}
function drawHealth(logs) {
  const o = [...logs].reverse(), lb = o.map(l=>shortDate(l.date));
  drawBar('c-cal',    lb, o.map(l=>totalKcal(l)),         '#EF4444', 2000);
  drawLine('c-weight',lb, o.map(l=>l.weight_kg||0),        '#10B981', 66);
  drawLine('c-sleep', lb, o.map(l=>l.sleep_hours||0),       '#8B5CF6', 7.5);
  drawBar('c-steps',  lb, o.map(l=>(l.steps||0)/1000),     '#F59E0B', 8);
}

// ══ TAB 2 — Tập luyện ══
const TYPE_META = {
  gym:{ico:'💪',color:'#8B5CF6'},cardio:{ico:'🏃',color:'#EF4444'},
  yoga:{ico:'🧘',color:'#EC4899'},swim:{ico:'🏊',color:'#3B82F6'},
  bike:{ico:'🚴',color:'#F59E0B'},other:{ico:'⚡',color:'#6B7280'}
};
function renderWorkout(logs) {
  if (!logs.length) return '<div class="loading">😶 Chưa có buổi tập nào<br><span style="font-size:12px;color:var(--faint);margin-top:8px;display:block">Báo Claude khi tập xong: "tập gym 3x10 bench press 60kg"</span></div>';
  const sessions = logs.flatMap(l=>(l.sessions||[]).map(s=>({...s,date:l.date})));
  const totMin   = sessions.reduce((s,x)=>s+(x.duration_min||0),0);
  const totKcal  = sessions.reduce((s,x)=>s+(x.calories||0),0);
  const rows = sessions.slice(0,20).map(s => {
    const m = TYPE_META[s.type.split(' ')[0]]||TYPE_META.other;
    const ex = (s.exercises||[]).map(e => {
      const detail = Array.isArray(e.sets)
        ? e.sets.map(st=>`${st.reps}×${st.weight_kg}kg`).join(', ')
        : [e.sets&&`${e.sets} sets`, e.reps&&`${e.reps} reps`, e.duration_per_set_sec&&`${e.duration_per_set_sec}s/set`, e.notes].filter(Boolean).join(' · ');
      return `<div class="hi-extra">${e.name}${detail?' — '+detail:''}</div>`;
    }).join('');
    const dur = s.duration_min ? `${s.duration_min} phút · ` : '';
    return `<div class="hi">
      <div class="hi-ico" style="background:${m.color}22">${m.ico}</div>

// ══ CHART ENGINE ══
function setupCanvas(id, h=140) {
  const c=document.getElementById(id); if (!c) return null;
  const dpr=window.devicePixelRatio||1, W=c.parentElement.offsetWidth||300;
  c.style.width=W+'px'; c.style.height=h+'px'; c.width=W*dpr; c.height=h*dpr;
  const ctx=c.getContext('2d'); ctx.scale(dpr,dpr);
  return {ctx,W,H:h};
}
function noData(ctx,W,H) { ctx.fillStyle='#9CA3AF'; ctx.font='12px -apple-system'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('Chưa có dữ liệu',W/2,H/2); }

function drawBar(id, labels, data, color, goal=null) {
  const s=setupCanvas(id); if (!s) return;
  const {ctx,W,H}=s; ctx.clearRect(0,0,W,H);
  if (data.every(v=>!v)) { noData(ctx,W,H); return; }
  const pad={t:22,r:10,b:26,l:32}, cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const max=Math.max(...data,goal||0)*1.2||1;
  if (goal) {
    const gy=pad.t+ch-(goal/max)*ch;
    ctx.setLineDash([4,3]); ctx.strokeStyle=color+'66'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pad.l,gy); ctx.lineTo(W-pad.r,gy); ctx.stroke(); ctx.setLineDash([]);
  }
  [0,.5,1].forEach(t=>{
    const y=pad.t+ch*t; ctx.strokeStyle='#F3F4F6'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#9CA3AF'; ctx.font='9px -apple-system'; ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText((max*(1-t)).toFixed(max>10?0:1),pad.l-3,y);
  });
  const n=labels.length, slotW=cw/Math.max(n,1), barW=Math.min(slotW*.6,28);
  data.forEach((v,i)=>{
    const x=pad.l+slotW*i+(slotW-barW)/2, bh=(v/max)*ch, y=pad.t+ch-bh, now=i===n-1;
    ctx.fillStyle=now?color:color+'77';
    if (bh>0) {
      ctx.beginPath(); const r=4; ctx.moveTo(x+r,y); ctx.lineTo(x+barW-r,y);
      ctx.quadraticCurveTo(x+barW,y,x+barW,y+r); ctx.lineTo(x+barW,pad.t+ch);
      ctx.lineTo(x,pad.t+ch); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.fill();
    }
    if (v>0) { ctx.fillStyle='#374151'; ctx.font=`${now?'bold ':''} 9px -apple-system`; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(v%1===0?v:v.toFixed(1),x+barW/2,y-2); }
    ctx.fillStyle=now?'#111827':'#9CA3AF'; ctx.font=`${now?'bold ':''} 9px -apple-system`; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(labels[i],x+barW/2,H-2);
  });
}

function drawLine(id, labels, data, color, goal=null) {
  const s=setupCanvas(id); if (!s) return;
  const {ctx,W,H}=s; ctx.clearRect(0,0,W,H);
  const nz=data.filter(v=>v>0); if (!nz.length) { noData(ctx,W,H); return; }
  const pad={t:22,r:10,b:26,l:34}, cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const max=Math.max(...nz,goal||0)*1.15, min=Math.min(...nz)*.85, rng=max-min||1;
  if (goal) {
    const gy=pad.t+ch-((goal-min)/rng)*ch; ctx.setLineDash([4,3]); ctx.strokeStyle=color+'55'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pad.l,gy); ctx.lineTo(W-pad.r,gy); ctx.stroke(); ctx.setLineDash([]);
  }
  [0,.5,1].forEach(t=>{
    const y=pad.t+ch*t; ctx.strokeStyle='#F3F4F6'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#9CA3AF'; ctx.font='9px -apple-system'; ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText((max-rng*t).toFixed(1),pad.l-3,y);
  });
  const n=labels.length;
  const pts=data.map((v,i)=>({x:pad.l+(n>1?(i/(n-1))*cw:cw/2), y:v>0?pad.t+ch-((v-min)/rng)*ch:null}));
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,color+'30'); grad.addColorStop(1,color+'00');
  ctx.beginPath(); let ok=false;
  pts.forEach(p=>{ if(!p.y)return; if(!ok){ctx.moveTo(p.x,pad.t+ch);ctx.lineTo(p.x,p.y);ok=true;}else ctx.lineTo(p.x,p.y); });
  const lp=[...pts].reverse().find(p=>p.y); if(lp) ctx.lineTo(lp.x,pad.t+ch);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.lineJoin='round';
  let ls=false; pts.forEach(p=>{ if(!p.y){ls=false;return;} if(!ls){ctx.moveTo(p.x,p.y);ls=true;}else ctx.lineTo(p.x,p.y); });
  ctx.stroke();
  pts.forEach((p,i)=>{
    if (!p.y) return;
    ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.fillStyle='white'; ctx.strokeStyle=color; ctx.lineWidth=2; ctx.fill(); ctx.stroke();
    ctx.fillStyle='#374151'; ctx.font='9px -apple-system'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    if (data[i]) ctx.fillText(data[i]%1===0?data[i]:data[i].toFixed(1),p.x,p.y-5);
  });
  labels.forEach((l,i)=>{
    const x=pad.l+(n>1?(i/(n-1))*cw:cw/2);
    ctx.fillStyle=i===n-1?'#111827':'#9CA3AF'; ctx.font=`${i===n-1?'bold ':''} 9px -apple-system`;
    ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(l,x,H-2);
  });
}

// ── Helpers ──
const DAYS=['CN','T2','T3','T4','T5','T6','T7'];
function shortDate(s) { const d=new Date(s+'T12:00:00'); return DAYS[d.getDay()]; }
function fmt(s) { const d=new Date(s+'T12:00:00'); return `${DAYS[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`; }
function totalKcal(log) { return (log.meals||[]).reduce((s,m)=>s+(m.total_kcal||0),0); }
function totalMacro(log,k) { return (log.meals||[]).reduce((s,m)=>s+(m['total_'+k]||0),0); }
function avg(arr,fn) { const v=arr.map(fn).filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; }
function pc(v,max) { return Math.min(100,(v/max)*100).toFixed(1); }
function vnd(n) { if(n>=1000000)return(n/1000000).toFixed(1)+'tr'; if(n>=1000)return Math.round(n/1000)+'k'; return n+''; }
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }

// ── 1.1 Streak counter ──
function computeStreak(idxDesc) {
  if (!idxDesc?.length) return 0;
  const today = todayStr();
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = isoLocal(y);
  let start = idxDesc.includes(today) ? today
            : idxDesc.includes(yesterday) ? yesterday
            : null;
  if (!start) return 0;
  let count = 0;
  let cursor = new Date(start+'T12:00:00');
  while (idxDesc.includes(isoLocal(cursor))) {
    count++;
    cursor.setDate(cursor.getDate()-1);
  }
  return count;
}
function renderStreakBadge() {
  const all = [...new Set([...healthIdx, ...workoutIdx, ...financeIdx])].sort((a,b)=>b.localeCompare(a));
  const s = computeStreak(all);
  const el = document.getElementById('streak-badge');
  if (!el) return;
  el.innerHTML = s>0
    ? `<span style="font-size:13px;font-weight:700;color:var(--amber);background:#FEF3C7;padding:3px 9px;border-radius:12px;margin-left:4px">🔥 ${s} ngày</span>`
    : '';
}

// ── 1.3 Weekly summary (this 7 vs prev 7) ──
function renderWeeklySummary(logs) {
  if (logs.length < 4) return '';
  const today = new Date();
  const cutThis  = isoLocal(addDays(today,-7));
  const cutPrev  = isoLocal(addDays(today,-14));
  const thisWk = logs.filter(l => l.date >  cutThis);
  const prevWk = logs.filter(l => l.date <= cutThis && l.date > cutPrev);
  if (!thisWk.length) return '';
  const metrics = [
    { lbl:'Kcal/ngày',    f:l=>totalKcal(l),         fmt:v=>Math.round(v),    unit:'' },
    { lbl:'Protein',      f:l=>totalMacro(l,'protein'),fmt:v=>Math.round(v)+'g', unit:'' },
    { lbl:'Ngủ',          f:l=>l.sleep_hours||0,     fmt:v=>v.toFixed(1)+'h', unit:'' },
    { lbl:'Bước',         f:l=>l.steps||0,           fmt:v=>(v/1000).toFixed(1)+'k', unit:'' }
  ];
  const rows = metrics.map(m => {
    const cur = avg(thisWk, m.f);
    const prv = avg(prevWk, m.f);
    const diff = prv>0 ? ((cur-prv)/prv*100) : 0;
    const arrow = Math.abs(diff)<3 ? '→' : (diff>0?'↑':'↓');
    const color = Math.abs(diff)<3 ? 'var(--muted)' : (diff>0?'var(--green-d)':'var(--red)');
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:12px;color:var(--muted)">${m.lbl}</span>
      <span style="font-size:14px;font-weight:700">${m.fmt(cur)}</span>
      <span style="font-size:11px;color:${color};font-weight:600;min-width:55px;text-align:right">${prvWkLabel(prv,m,arrow,diff)}</span>
    </div>`;
  }).join('');
  return `<div class="card">
    <div class="card-label">📊 TUẦN NÀY vs TUẦN TRƯỚC</div>
    ${rows}
  </div>`;
}
function prvWkLabel(prv, m, arrow, diff) {
  if (!prv) return '<span style="color:var(--faint)">—</span>';
  return `${arrow} ${Math.abs(diff).toFixed(0)}%`;
}

// ── 1.4 PR tracker ──
function epley(weight, reps) { return weight * (1 + reps/30); }
function extractSets(ex) {
  // legacy schema: e.sets = array of {reps, weight_kg}
  if (Array.isArray(ex.sets)) return ex.sets.filter(s => s.reps && s.weight_kg);
  // new schema: numeric sets/reps + (optional) weight_kg
  if (typeof ex.sets === 'number' && ex.reps && ex.weight_kg) {
    return Array.from({length:ex.sets}, () => ({reps:ex.reps, weight_kg:ex.weight_kg}));
  }
  return [];
}
function computePRs(logs) {
  const byEx = {}; // name -> { maxWeight: {w,d}, max1RM: {w,r,e,d} }
  logs.slice().reverse().forEach(l => {
    (l.sessions||[]).forEach(s => {
      (s.exercises||[]).forEach(ex => {
        const sets = extractSets(ex);
        if (!sets.length) return;
        const name = ex.name;
        if (!byEx[name]) byEx[name] = { maxWeight: null, max1RM: null, lastDate: l.date };
        byEx[name].lastDate = l.date;
        sets.forEach(st => {
          const e1 = epley(st.weight_kg, st.reps);
          if (!byEx[name].maxWeight || st.weight_kg > byEx[name].maxWeight.w) {
            const isNew = byEx[name].maxWeight && st.weight_kg > byEx[name].maxWeight.w;
            byEx[name].maxWeight = { w: st.weight_kg, r: st.reps, d: l.date, isNew: isNew||false };
          }
          if (!byEx[name].max1RM || e1 > byEx[name].max1RM.e) {
            const isNew = byEx[name].max1RM && e1 > byEx[name].max1RM.e;
            byEx[name].max1RM = { e: e1, w: st.weight_kg, r: st.reps, d: l.date, isNew: isNew||false };
          }
        });
      });
    });
  });
  return byEx;
}
function renderPRs(logs) {
  const prs = computePRs(logs);
  const entries = Object.entries(prs);
  if (!entries.length) return '';
  const rows = entries.slice(0,10).map(([name,p]) => {
    const recentPR = (p.maxWeight?.d === p.lastDate && p.maxWeight?.isNew) || (p.max1RM?.d === p.lastDate && p.max1RM?.isNew);
    return `<div class="hi">
      <div class="hi-ico" style="background:#FEF3C7">🏆</div>
      <div class="hi-info">
        <div class="hi-title">${name}${recentPR?' <span style="background:#FEE2E2;color:#991B1B;font-size:9px;padding:2px 6px;border-radius:8px;margin-left:4px;font-weight:800">NEW PR</span>':''}</div>
        <div class="hi-sub">Heaviest: <strong>${p.maxWeight.w}kg × ${p.maxWeight.r}</strong> (${fmt(p.maxWeight.d)})</div>
        <div class="hi-extra">Est. 1RM: <strong>${p.max1RM.e.toFixed(1)}kg</strong> (Epley)</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="stitle">🏆 Personal Records</div><div class="card">${rows}</div>`;
}

// ── Helpers ──
function todayStr() { return isoLocal(new Date()); }
function isoLocal(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function addDays(d,n) { const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function fmtFull(s) { const d=new Date(s+'T12:00:00'); return `${DAYS[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`; }

// ── Boot ──
if (checkPat()) reload();
</script>
