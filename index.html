<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>opus-vita</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0A0A0F;
  --card: #16161D;
  --card-2: #1C1C24;
  --text: #FFFFFF;
  --muted: #8E8E93;
  --faint: #5A5A66;
  --line: rgba(255,255,255,.06);

  --green: #30D158;
  --green-d: #28B14B;
  --blue: #0A84FF;
  --orange: #FF9F0A;
  --red: #FF453A;
  --pink: #FF375F;
  --purple: #BF5AF2;
  --teal: #5AC8FA;
  --yellow: #FFD60A;
}
html, body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
#app { max-width: 430px; margin: 0 auto; min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(10,10,15,.85);
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
  padding: 12px 14px 0;
}
.tb-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.tb-row1 h1 { font-size: 17px; font-weight: 800; display: flex; align-items: center; gap: 6px; }
.sync-btn { font-size: 12px; padding: 6px 11px; background: rgba(48,209,88,.15); color: var(--green); border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-family: inherit; }
.pat-btn { font-size: 12px; padding: 6px 10px; background: rgba(255,255,255,.06); color: var(--muted); border: none; border-radius: 8px; cursor: pointer; font-family: inherit; }

.mod-tabs { display: flex; }
.mtab { flex: 1; padding: 9px 4px 10px; text-align: center; font-size: 12px; font-weight: 700; border: none; background: none; cursor: pointer; font-family: inherit; color: var(--faint); border-bottom: 2.5px solid transparent; transition: color .18s, border-bottom-color .18s; }
.mtab.active { color: var(--green); border-bottom-color: var(--green); }

.range-row { display: flex; gap: 6px; padding: 8px 0 10px; }
.rtab { flex: 1; padding: 6px; text-align: center; font-size: 11px; font-weight: 700; border-radius: 7px; border: none; background: rgba(255,255,255,.05); color: var(--muted); cursor: pointer; font-family: inherit; }
.rtab.active { background: var(--green); color: #000; }

/* ── Content ── */
.content { padding: 12px 12px 32px; }

/* ── Bento grid ── */
.bento { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.b { background: var(--card); border-radius: 18px; padding: 14px; overflow: hidden; position: relative; min-height: 92px; }
.b.span2 { grid-column: span 2; }
.b.span3 { grid-column: span 3; }
.b.span4 { grid-column: span 4; }
.b.tall  { min-height: 168px; }

.b-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 6px; }
.b-val { font-size: 28px; font-weight: 800; line-height: 1; letter-spacing: -.5px; }
.b-unit { font-size: 13px; font-weight: 600; color: var(--muted); margin-left: 2px; }
.b-sub { font-size: 11px; color: var(--muted); margin-top: 5px; font-weight: 500; }
.b-ico { position: absolute; top: 12px; right: 12px; font-size: 18px; opacity: .9; }

/* ── Variants ── */
.b-kcal   { background: linear-gradient(135deg, #1A1A24, #0F0F18); border: 1px solid rgba(255,69,58,.18); }
.b-kcal .b-val { font-size: 36px; color: var(--red); }
.b-kcal .progress { margin-top: 10px; height: 6px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; }
.b-kcal .progress > div { height: 100%; background: linear-gradient(90deg, var(--red), var(--orange)); border-radius: 3px; }

.b-sleep  { background: linear-gradient(135deg, #14142A, #0F0F1F); border: 1px solid rgba(191,90,242,.2); }
.b-sleep .b-val { color: var(--purple); }
.b-water  { background: linear-gradient(135deg, #0E1A2A, #0A1422); border: 1px solid rgba(10,132,255,.2); }
.b-water .b-val { color: var(--blue); }
.b-steps  { background: linear-gradient(135deg, #2A1F0E, #221A0A); border: 1px solid rgba(255,159,10,.2); }
.b-steps .b-val { color: var(--orange); }
.b-weight { background: linear-gradient(135deg, #0E2A1F, #0A2018); border: 1px solid rgba(48,209,88,.2); }
.b-weight .b-val { color: var(--green); }
.b-workout{ background: linear-gradient(135deg, #2A1A2E, #1A1A24); border: 1px solid rgba(191,90,242,.2); }
.b-insight{ background: linear-gradient(135deg, #0E1A2A, #0F1A28); border: 1px solid rgba(90,200,250,.2); }
.b-pr     { background: linear-gradient(135deg, #2A2014, #1F1810); border: 1px solid rgba(255,214,10,.2); }

/* ── Macros mini ── */
.macro-mini { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
.macro-mini:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.05); }
.macro-mini .n { font-size: 12px; color: var(--muted); font-weight: 600; }
.macro-mini .v { font-size: 14px; font-weight: 800; }

/* ── Mini chart ── */
.mini-chart { height: 32px; margin-top: 8px; }
.mini-chart svg { width: 100%; height: 100%; }

/* ── Chart card ── */
.b-chart { padding: 14px; }
.b-chart .b-label { margin-bottom: 8px; }
.chart-wrap { height: 140px; }
canvas { display: block; }

/* ── Insight badges (workout) ── */
.badges { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.badge { font-size: 11px; padding: 4px 9px; border-radius: 10px; background: rgba(191,90,242,.18); color: var(--purple); font-weight: 700; }
.badge.amber { background: rgba(255,159,10,.18); color: var(--orange); }
.badge.green { background: rgba(48,209,88,.18); color: var(--green); }
.badge.red   { background: rgba(255,69,58,.18); color: var(--red); }

/* ── Insight rows (weekly summary) ── */
.is-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
.is-row:last-child { border-bottom: none; }
.is-lbl { font-size: 12px; color: var(--muted); font-weight: 600; }
.is-val { font-size: 14px; font-weight: 800; }
.is-delta { font-size: 11px; font-weight: 700; min-width: 55px; text-align: right; }

/* ── Day accordion (bento) ── */
.day-acc { background: var(--card); border-radius: 14px; margin-bottom: 7px; overflow: hidden; }
.day-acc summary { list-style: none; cursor: pointer; padding: 13px 14px; display: flex; align-items: center; gap: 10px; user-select: none; -webkit-tap-highlight-color: transparent; }
.day-acc summary::-webkit-details-marker { display: none; }
.day-acc summary:active { background: rgba(255,255,255,.03); }
.da-date { font-size: 13px; font-weight: 700; flex: 1; }
.da-meta { font-size: 11px; color: var(--muted); }
.da-kcal { font-size: 14px; font-weight: 800; color: var(--green); }
.da-chev { font-size: 13px; color: var(--faint); transition: transform .2s; }
.day-acc[open] .da-chev { transform: rotate(180deg); }
.da-body { padding: 0 14px 12px; border-top: 1px solid var(--line); }

/* ── Meal item ── */
.mi { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); }
.mi:last-child { border-bottom: none; }
.mi-ico { font-size: 16px; flex-shrink: 0; }
.mi-info { flex: 1; min-width: 0; }
.mi-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mi-mac  { font-size: 10px; color: var(--muted); margin-top: 2px; }
.mi-kcal { font-size: 13px; font-weight: 800; color: var(--green); flex-shrink: 0; }

/* ── History items (workout / finance) ── */
.hi { display: flex; align-items: center; gap: 11px; padding: 10px 0; border-bottom: 1px solid var(--line); }
.hi:last-child { border-bottom: none; }
.hi-ico { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.hi-info { flex: 1; min-width: 0; }
.hi-title { font-size: 13px; font-weight: 700; }
.hi-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
.hi-extra { font-size: 10px; color: var(--muted); margin-top: 1px; }
.hi-val   { font-size: 14px; font-weight: 800; flex-shrink: 0; }

/* ── Section title ── */
.stitle { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 16px 0 8px; padding-left: 2px; }

/* ── Streak pill ── */
.streak-pill { background: linear-gradient(135deg, var(--orange), var(--red)); padding: 5px 11px; border-radius: 14px; font-size: 12px; font-weight: 800; color: #fff; }

/* ── Progress bar mini ── */
.pbar { height: 5px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; }
.pfill { height: 100%; border-radius: 3px; }

/* ── Loading / error ── */
.loading { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }
.spin { font-size: 26px; display: block; margin-bottom: 10px; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.err { background: rgba(255,69,58,.08); border-left: 3px solid var(--red); border-radius: 10px; padding: 14px; font-size: 13px; color: #FF7B6E; line-height: 1.6; }

/* ── Toast ── */
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--card-2); color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 999; transition: transform .3s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; border: 1px solid var(--line); }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<!-- PAT Screen -->
<div id="pat-screen" style="display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px">
  <div style="font-size:52px;margin-bottom:16px">🌿</div>
  <div style="font-size:22px;font-weight:800;margin-bottom:6px">opus-vita</div>
  <div style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px">Nhập GitHub PAT để truy cập dữ liệu</div>
  <div style="width:100%;background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid var(--line)">
    <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:7px;display:block">GitHub PAT</label>
    <input id="pat-input" type="password" placeholder="github_pat_..." style="width:100%;padding:11px 13px;background:rgba(255,255,255,.04);border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;color:#fff">
    <p style="font-size:11px;color:var(--faint);margin-top:8px;line-height:1.6">Scope cần: <strong style="color:var(--muted)">Contents = Read-only</strong> cho repo <code style="color:var(--green)">ai-project-opus</code></p>
  </div>
  <button onclick="savePat()" style="width:100%;padding:14px;background:linear-gradient(135deg,var(--green),var(--green-d));color:#000;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit">Kết nối →</button>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-row1">
      <h1>🌿 opus-vita <span id="streak-badge"></span></h1>
      <div style="display:flex;gap:6px">
        <button class="sync-btn" onclick="reload()">↻ Sync</button>
        <button class="pat-btn" onclick="resetPat()">🔑</button>
      </div>
    </div>
    <div class="mod-tabs">
      <button class="mtab active" id="mt-health"  onclick="showTab('health')">🌿 Sức khỏe</button>
      <button class="mtab"        id="mt-workout" onclick="showTab('workout')">💪 Tập luyện</button>
      <button class="mtab"        id="mt-finance" onclick="showTab('finance')">💰 Tài chính</button>
    </div>
    <div class="range-row">
      <button class="rtab active" onclick="setRange(7,this)">7 ngày</button>
      <button class="rtab"        onclick="setRange(14,this)">14 ngày</button>
      <button class="rtab"        onclick="setRange(30,this)">30 ngày</button>
      <button class="rtab"        onclick="setRange(90,this)">3 tháng</button>
    </div>
  </div>
  <div class="content" id="content">
    <div class="loading"><span class="spin">🌿</span>Đang tải...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Config ──
const DATA_REPO   = 'lechihuy-droid/ai-project-opus';
const DATA_BRANCH = 'main';

let PAT = localStorage.getItem('ov_pat') || '';
let currentRange = 7;
let currentTab   = 'health';
let cHealth = [], cWorkout = [], cFinance = [];
let healthIdx = [], workoutIdx = [], financeIdx = [];

const TARGET = { kcal: 2200, protein: 130, water_ml: 2000, steps: 8000, sleep: 7.5 };

// ── PAT setup ──
function checkPat() {
  if (!PAT) {
    document.getElementById('pat-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return false;
  }
  return true;
}
function savePat() {
  const v = document.getElementById('pat-input').value.trim();
  if (!v) return;
  PAT = v;
  localStorage.setItem('ov_pat', PAT);
  document.getElementById('pat-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  reload();
}
function resetPat() {
  localStorage.removeItem('ov_pat');
  PAT = '';
  document.getElementById('pat-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── Fetch ──
async function ghGet(path) {
  const url = `https://api.github.com/repos/${DATA_REPO}/contents/${path}?ref=${DATA_BRANCH}`;
  const r = await fetch(url, { headers: { 'Authorization': `Bearer ${PAT}`, 'Accept': 'application/vnd.github.v3+json' } });
  if (!r.ok) { if (r.status===404) return null; throw new Error(`${r.status}: ${path}`); }
  const d = await r.json();
  const bytes = Uint8Array.from(atob(d.content.replace(/\n/g,'')), c => c.charCodeAt(0));
  return JSON.parse(new TextDecoder().decode(bytes));
}
function datesInRange(n) {
  return Array.from({length:n}, (_,i) => { const d = new Date(); d.setDate(d.getDate()-i); return isoLocal(d); });
}
async function loadModule(prefix, range) {
  const idx = await ghGet(`${prefix}/index.json`);
  if (!idx?.length) return { rows: [], idx: [] };
  const dates = datesInRange(range).filter(d => idx.includes(d));
  const rows  = await Promise.all(dates.map(d => ghGet(`${prefix}/${d}.json`)));
  return { rows: rows.filter(Boolean).sort((a,b)=>b.date.localeCompare(a.date)), idx: [...idx].sort((a,b)=>b.localeCompare(a)) };
}

// ── Nav ──
function setRange(n, btn) {
  currentRange = n;
  document.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  reload();
}
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.mtab').forEach(b => b.classList.remove('active'));
  document.getElementById('mt-'+tab).classList.add('active');
  renderContent();
}

async function reload() {
  document.getElementById('content').innerHTML = '<div class="loading"><span class="spin">🌿</span>Đang tải...</div>';
  try {
    const [h, w, f] = await Promise.all([
      loadModule('health-data',  currentRange),
      loadModule('workout-data', currentRange).catch(()=>({rows:[],idx:[]})),
      loadModule('finance-data', currentRange).catch(()=>({rows:[],idx:[]}))
    ]);
    cHealth = h.rows;  healthIdx  = h.idx;
    cWorkout = w.rows; workoutIdx = w.idx;
    cFinance = f.rows; financeIdx = f.idx;
    renderStreakBadge();
    renderContent();
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="err">❌ Lỗi tải dữ liệu:<br><strong>${e.message}</strong><br><br>Kiểm tra PAT hoặc kết nối mạng. <span style="text-decoration:underline;cursor:pointer" onclick="resetPat()">Đổi PAT</span></div>`;
  }
}
function renderContent() {
  const el = document.getElementById('content');
  if (currentTab==='health')  { el.innerHTML=renderHealth(cHealth);  setTimeout(()=>drawHealth(cHealth),30); }
  if (currentTab==='workout') { el.innerHTML=renderWorkout(cWorkout);setTimeout(()=>drawWorkout(cWorkout),30); }
  if (currentTab==='finance') { el.innerHTML=renderFinance(cFinance);setTimeout(()=>drawFinance(cFinance),30); }
}

// ══════════════════════════════════════════════════════
// ║  TAB 1 — Sức khỏe (Bento)                          ║
// ══════════════════════════════════════════════════════
function renderHealth(logs) {
  if (!logs.length) return `<div class="loading">😶 Chưa có dữ liệu sức khỏe<br><span style="font-size:12px;color:var(--faint);margin-top:8px;display:block">Gửi ảnh bữa ăn cho Claude để bắt đầu</span></div>
    <button onclick="debugFetch()" style="display:block;margin:8px auto;padding:8px 16px;background:rgba(255,255,255,.06);color:var(--muted);border:none;border-radius:8px;font-size:12px;cursor:pointer">🔍 Test API</button>
    <pre id="dbg-out" style="display:none;background:var(--card);border-radius:8px;padding:12px;font-size:11px;white-space:pre-wrap;margin:8px 0;color:var(--muted)"></pre>`;

  const latest    = logs[0];
  const today     = todayStr();
  const todayLog  = logs.find(l => l.date === today);
  const shown     = todayLog || latest;
  const isToday   = shown?.date === today;
  const kcal      = totalKcal(shown);
  const protein   = totalMacro(shown,'protein');
  const carb      = totalMacro(shown,'carb');
  const fat       = totalMacro(shown,'fat');
  const fiber     = totalMacro(shown,'fiber');
  const kcalPct   = Math.min(100, (kcal/TARGET.kcal)*100);
  const remain    = TARGET.kcal - kcal;
  const withW     = logs.filter(l => l.weight_kg>0);
  const wLatest   = withW[0];
  const wFirst    = withW[withW.length-1];
  const wDelta    = wFirst&&wLatest ? +(wLatest.weight_kg-wFirst.weight_kg).toFixed(1) : null;

  return `<div class="bento">

    <!-- HERO: Calo -->
    <div class="b b-kcal span4">
      <div class="b-label">${isToday?'CALO HÔM NAY':`CALO · ${fmtFull(shown.date).toUpperCase()}`}</div>
      <div style="display:flex;align-items:baseline;gap:8px">
        <div class="b-val">${kcal.toLocaleString()}</div>
        <div style="font-size:14px;color:var(--muted);font-weight:700">/ ${TARGET.kcal.toLocaleString()} kcal</div>
      </div>
      <div class="progress"><div style="width:${kcalPct}%"></div></div>
      <div class="b-sub">${remain>0?`Còn ${remain} kcal trong target`:`Vượt ${-remain} kcal`}</div>
      <div class="b-ico">🔥</div>
    </div>

    <!-- Macros -->
    <div class="b span2 tall">
      <div class="b-label">MACROS</div>
      <div class="macro-mini"><div class="n">Protein</div><div class="v" style="color:var(--blue)">${Math.round(protein)}g</div></div>
      <div class="macro-mini"><div class="n">Carb</div><div class="v" style="color:var(--orange)">${Math.round(carb)}g</div></div>
      <div class="macro-mini"><div class="n">Fat</div><div class="v" style="color:var(--red)">${Math.round(fat)}g</div></div>
      <div class="macro-mini"><div class="n">Chất xơ</div><div class="v" style="color:var(--green)">${fiber>0?Math.round(fiber)+'g':'—'}</div></div>
    </div>

    <!-- Sleep -->
    <div class="b b-sleep span2">
      <div class="b-label">NGỦ</div>
      <div class="b-val">${(shown.sleep_hours||0).toFixed(1)}<span class="b-unit">h</span></div>
      <div class="b-sub">${shown.sleep_hours?`${pc(shown.sleep_hours,TARGET.sleep)}% target`:'chưa log'}</div>
      <div class="b-ico">😴</div>
    </div>

    <!-- Water -->
    <div class="b b-water span2">
      <div class="b-label">NƯỚC</div>
      <div class="b-val">${((shown.water_ml||0)/1000).toFixed(1)}<span class="b-unit">L</span></div>
      <div class="b-sub" style="color:${shown.water_ml>=TARGET.water_ml?'var(--green)':'var(--muted)'};font-weight:700">${shown.water_ml>=TARGET.water_ml?'✓ Đủ':`/ ${TARGET.water_ml/1000}L`}</div>
      <div class="b-ico">💧</div>
    </div>

    <!-- Steps -->
    <div class="b b-steps span2">
      <div class="b-label">BƯỚC CHÂN</div>
      <div class="b-val">${((shown.steps||0)/1000).toFixed(1)}<span class="b-unit">k</span></div>
      <div class="b-sub">/ ${TARGET.steps/1000}k target</div>
      <div class="b-ico">👟</div>
    </div>

    <!-- Weight -->
    <div class="b b-weight span2">
      <div class="b-label">CÂN NẶNG</div>
      <div class="b-val">${wLatest?wLatest.weight_kg:'—'}<span class="b-unit">${wLatest?'kg':''}</span></div>
      <div class="b-sub" style="color:${wDelta===null?'var(--muted)':wDelta<0?'var(--green)':wDelta>0?'var(--red)':'var(--muted)'};font-weight:700">${wDelta===null?'chưa có':`${wDelta>0?'↑':'↓'} ${Math.abs(wDelta)}kg / ${currentRange}d`}</div>
      <div class="b-ico">⚖️</div>
    </div>

    ${renderWeeklySummary(logs)}

    <!-- Chart: calo -->
    <div class="b b-chart span4 tall">
      <div class="b-label">📈 Calo / ngày · ${currentRange} ngày</div>
      <div class="chart-wrap"><canvas id="c-cal"></canvas></div>
    </div>

function renderWeeklySummary(logs) {
  if (logs.length < 4) return '';
  const today = new Date();
  const cutThis  = isoLocal(addDays(today,-7));
  const cutPrev  = isoLocal(addDays(today,-14));
  const thisWk = logs.filter(l => l.date >  cutThis);
  const prevWk = logs.filter(l => l.date <= cutThis && l.date > cutPrev);
  if (!thisWk.length) return '';
  const metrics = [
    { lbl:'Kcal/ngày',  f:l=>totalKcal(l),         fmt:v=>Math.round(v) },
    { lbl:'Protein',    f:l=>totalMacro(l,'protein'),fmt:v=>Math.round(v)+'g' },
    { lbl:'Ngủ',        f:l=>l.sleep_hours||0,     fmt:v=>v.toFixed(1)+'h' },
    { lbl:'Bước',       f:l=>l.steps||0,           fmt:v=>(v/1000).toFixed(1)+'k' }
  ];
  const rows = metrics.map(m => {
    const cur = avg(thisWk, m.f);
    const prv = avg(prevWk, m.f);
    const diff = prv>0 ? ((cur-prv)/prv*100) : 0;
    const arrow = Math.abs(diff)<3 ? '→' : (diff>0?'↑':'↓');
    const color = Math.abs(diff)<3 ? 'var(--muted)' : (diff>0?'var(--green)':'var(--red)');
    const dlabel = prv>0 ? `${arrow} ${Math.abs(diff).toFixed(0)}%` : '—';
    return `<div class="is-row">
      <span class="is-lbl">${m.lbl}</span>
      <span class="is-val">${m.fmt(cur)}</span>
      <span class="is-delta" style="color:${color}">${dlabel}</span>
    </div>`;
  }).join('');
  return `<div class="b b-insight span4">
    <div class="b-label" style="color:var(--teal)">📊 TUẦN NÀY vs TUẦN TRƯỚC</div>
    ${rows}
  </div>`;
}

// ══ CHART ENGINE (dark theme) ══
function setupCanvas(id, h=140) {
  const c=document.getElementById(id); if (!c) return null;
  const dpr=window.devicePixelRatio||1, W=c.parentElement.offsetWidth||300;
  c.style.width=W+'px'; c.style.height=h+'px'; c.width=W*dpr; c.height=h*dpr;
  const ctx=c.getContext('2d'); ctx.scale(dpr,dpr);
  return {ctx,W,H:h};
}
function noData(ctx,W,H) { ctx.fillStyle='#5A5A66'; ctx.font='12px -apple-system'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('Chưa có dữ liệu',W/2,H/2); }

function drawBar(id, labels, data, color, goal=null) {
  const s=setupCanvas(id); if (!s) return;
  const {ctx,W,H}=s; ctx.clearRect(0,0,W,H);
  if (data.every(v=>!v)) { noData(ctx,W,H); return; }
  const pad={t:22,r:10,b:26,l:34}, cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const max=Math.max(...data,goal||0)*1.2||1;
  if (goal) {
    const gy=pad.t+ch-(goal/max)*ch;
    ctx.setLineDash([4,3]); ctx.strokeStyle=color+'66'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pad.l,gy); ctx.lineTo(W-pad.r,gy); ctx.stroke(); ctx.setLineDash([]);
  }
  [0,.5,1].forEach(t=>{
    const y=pad.t+ch*t; ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#5A5A66'; ctx.font='9px -apple-system'; ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText((max*(1-t)).toFixed(max>10?0:1),pad.l-3,y);
  });
  const n=labels.length, slotW=cw/Math.max(n,1), barW=Math.min(slotW*.6,28);
  data.forEach((v,i)=>{
    const x=pad.l+slotW*i+(slotW-barW)/2, bh=(v/max)*ch, y=pad.t+ch-bh, now=i===n-1;
    ctx.fillStyle=now?color:color+'66';
    if (bh>0) {
      ctx.beginPath(); const r=4; ctx.moveTo(x+r,y); ctx.lineTo(x+barW-r,y);
      ctx.quadraticCurveTo(x+barW,y,x+barW,y+r); ctx.lineTo(x+barW,pad.t+ch);
      ctx.lineTo(x,pad.t+ch); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.fill();
    }
    if (v>0) { ctx.fillStyle='#E5E5EA'; ctx.font=`${now?'bold ':''} 9px -apple-system`; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(v%1===0?v:v.toFixed(1),x+barW/2,y-2); }
    ctx.fillStyle=now?'#FFFFFF':'#8E8E93'; ctx.font=`${now?'bold ':''} 9px -apple-system`; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(labels[i],x+barW/2,H-2);
  });
}

function drawLine(id, labels, data, color, goal=null) {
  const s=setupCanvas(id); if (!s) return;
  const {ctx,W,H}=s; ctx.clearRect(0,0,W,H);
  const nz=data.filter(v=>v>0); if (!nz.length) { noData(ctx,W,H); return; }
  const pad={t:22,r:10,b:26,l:36}, cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const max=Math.max(...nz,goal||0)*1.15, min=Math.min(...nz)*.85, rng=max-min||1;
  if (goal) {
    const gy=pad.t+ch-((goal-min)/rng)*ch; ctx.setLineDash([4,3]); ctx.strokeStyle=color+'55'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pad.l,gy); ctx.lineTo(W-pad.r,gy); ctx.stroke(); ctx.setLineDash([]);
  }
  [0,.5,1].forEach(t=>{
    const y=pad.t+ch*t; ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#5A5A66'; ctx.font='9px -apple-system'; ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText((max-rng*t).toFixed(1),pad.l-3,y);
  });
  const n=labels.length;
  const pts=data.map((v,i)=>({x:pad.l+(n>1?(i/(n-1))*cw:cw/2), y:v>0?pad.t+ch-((v-min)/rng)*ch:null}));
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,color+'40'); grad.addColorStop(1,color+'00');
  ctx.beginPath(); let ok=false;
  pts.forEach(p=>{ if(!p.y)return; if(!ok){ctx.moveTo(p.x,pad.t+ch);ctx.lineTo(p.x,p.y);ok=true;}else ctx.lineTo(p.x,p.y); });
  const lp=[...pts].reverse().find(p=>p.y); if(lp) ctx.lineTo(lp.x,pad.t+ch);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.lineJoin='round';
  let ls=false; pts.forEach(p=>{ if(!p.y){ls=false;return;} if(!ls){ctx.moveTo(p.x,p.y);ls=true;}else ctx.lineTo(p.x,p.y); });
  ctx.stroke();
  pts.forEach((p,i)=>{
    if (!p.y) return;
    ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.fillStyle='#0A0A0F'; ctx.strokeStyle=color; ctx.lineWidth=2; ctx.fill(); ctx.stroke();
    ctx.fillStyle='#E5E5EA'; ctx.font='9px -apple-system'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    if (data[i]) ctx.fillText(data[i]%1===0?data[i]:data[i].toFixed(1),p.x,p.y-5);
  });
  labels.forEach((l,i)=>{
    const x=pad.l+(n>1?(i/(n-1))*cw:cw/2);
    ctx.fillStyle=i===n-1?'#FFFFFF':'#8E8E93'; ctx.font=`${i===n-1?'bold ':''} 9px -apple-system`;
    ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(l,x,H-2);
  });
}

// ══ PR helpers ══
function epley(weight, reps) { return weight * (1 + reps/30); }
function extractSets(ex) {
  if (Array.isArray(ex.sets)) return ex.sets.filter(s => s.reps && s.weight_kg);
  if (typeof ex.sets === 'number' && ex.reps && ex.weight_kg) {
    return Array.from({length:ex.sets}, () => ({reps:ex.reps, weight_kg:ex.weight_kg}));
  }
  return [];
}
function computePRs(logs) {
  const byEx = {};
  logs.slice().reverse().forEach(l => {
    (l.sessions||[]).forEach(s => {
      (s.exercises||[]).forEach(ex => {
        const sets = extractSets(ex);
        if (!sets.length) return;
        const name = ex.name;
        if (!byEx[name]) byEx[name] = { maxWeight: null, max1RM: null, lastDate: l.date };
        byEx[name].lastDate = l.date;
        sets.forEach(st => {
          const e1 = epley(st.weight_kg, st.reps);
          if (!byEx[name].maxWeight || st.weight_kg > byEx[name].maxWeight.w) {
            const isNew = byEx[name].maxWeight && st.weight_kg > byEx[name].maxWeight.w;
            byEx[name].maxWeight = { w: st.weight_kg, r: st.reps, d: l.date, isNew: isNew||false };
          }
          if (!byEx[name].max1RM || e1 > byEx[name].max1RM.e) {
            const isNew = byEx[name].max1RM && e1 > byEx[name].max1RM.e;
            byEx[name].max1RM = { e: e1, w: st.weight_kg, r: st.reps, d: l.date, isNew: isNew||false };
          }
        });
      });
    });
  });
  return byEx;
}

// ══ Streak ══
function computeStreak(idxDesc) {
  if (!idxDesc?.length) return 0;
  const today = todayStr();
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = isoLocal(y);
  let start = idxDesc.includes(today) ? today : idxDesc.includes(yesterday) ? yesterday : null;
  if (!start) return 0;
  let count = 0;
  let cursor = new Date(start+'T12:00:00');
  while (idxDesc.includes(isoLocal(cursor))) { count++; cursor.setDate(cursor.getDate()-1); }
  return count;
}
function renderStreakBadge() {
  const all = [...new Set([...healthIdx, ...workoutIdx, ...financeIdx])].sort((a,b)=>b.localeCompare(a));
  const s = computeStreak(all);
  const el = document.getElementById('streak-badge');
  if (!el) return;
  el.innerHTML = s>0 ? `<span class="streak-pill">🔥 ${s}</span>` : '';
}

// ══ Helpers ══
const DAYS=['CN','T2','T3','T4','T5','T6','T7'];
function shortDate(s) { const d=new Date(s+'T12:00:00'); return DAYS[d.getDay()]; }
function fmt(s) { const d=new Date(s+'T12:00:00'); return `${DAYS[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`; }
function fmtFull(s) { const d=new Date(s+'T12:00:00'); return `${DAYS[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`; }
function todayStr() { return isoLocal(new Date()); }
function isoLocal(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function addDays(d,n) { const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function totalKcal(log) { return (log.meals||[]).reduce((s,m)=>s+(m.total_kcal||0),0); }
function totalMacro(log,k) { return (log.meals||[]).reduce((s,m)=>s+(m['total_'+k]||0),0); }
function avg(arr,fn) { const v=arr.map(fn).filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; }
function pc(v,max) { return Math.min(100,(v/max)*100).toFixed(0); }
function vnd(n) { if(n>=1000000)return(n/1000000).toFixed(1)+'tr'; if(n>=1000)return Math.round(n/1000)+'k'; return n+''; }
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }

// ── Debug ──
async function debugFetch() {
  const out = document.getElementById('dbg-out');
  out.style.display = 'block';
  const today = todayStr();
  out.textContent = `Local date: ${today}\nPAT: ${PAT ? PAT.slice(0,20)+'...' : '(empty)'}\n\n`;
  const url = `https://api.github.com/repos/${DATA_REPO}/contents/health-data/index.json?ref=${DATA_BRANCH}`;
  try {
    const r = await fetch(url, { headers: { 'Authorization': `Bearer ${PAT}`, 'Accept': 'application/vnd.github.v3+json' } });
    out.textContent += `HTTP ${r.status} ${r.statusText}\n`;
    const body = await r.json();
    if (r.ok) {
      const bytes = Uint8Array.from(atob(body.content.replace(/\n/g,'')), c => c.charCodeAt(0));
      out.textContent += `index.json: ${new TextDecoder().decode(bytes)}`;
    } else { out.textContent += `Error: ${body.message}`; }
  } catch(e) { out.textContent += `Fetch failed: ${e.message}`; }
}

// ── Boot ──
if (checkPat()) reload();
