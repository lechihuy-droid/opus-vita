function formatCurrentTarget(current, target, unit) {
  const cur = Math.round(Number(current) || 0);
  const max = Math.round(Number(target) || 0);
  return `${cur.toLocaleString()} / ${max.toLocaleString()}${unit}`;
}

function formatMacroStatus(metric, risk, left) {
  if (!risk) return left > 0 ? `Còn ${left}g` : 'Đạt';
  if (metric === 'protein') return left > 40 ? 'Thiếu nhiều' : 'Thiếu';
  if (metric === 'carb') return left > 0 ? `Còn ${left}g` : 'Đạt';
  if (metric === 'fat') return risk.severity === 'bad' ? 'Vượt giới hạn' : 'Gần giới hạn';
  if (metric === 'fiber') return left > TARGET.fiber * 0.6 ? 'Rất thấp' : 'Còn thiếu';
  return left > 0 ? `Còn ${left}g` : 'Đạt';
}

function riskItem(type, severity, title, detail, action, priority) {
  return { type, severity, title, detail, action, priority };
}

function rankHealthRisks(metrics) {
  const { kcal, protein, fat, fiber, missingData } = metrics;
  const risks = [];
  const kcalRemain = TARGET.kcal - kcal;
  const proteinLeft = TARGET.protein - protein;
  const fiberVeryLowDays = (metrics.logs || []).filter(l => totalMacro(l, 'fiber') < TARGET.fiber * 0.35).length;

  if (fiber < TARGET.fiber * 0.4) {
    const sev = fiber < TARGET.fiber * 0.25 && fiberVeryLowDays >= 3 ? 'bad' : 'warn';
    risks.push(riskItem('fiber', sev, 'Chất xơ rất thấp', formatCurrentTarget(fiber, TARGET.fiber, 'g'), 'Thêm salad, rau xanh hoặc trái cây trong bữa tiếp theo.', 10));
  } else if (fiber < TARGET.fiber * 0.7) {
    risks.push(riskItem('fiber', 'warn', 'Chất xơ còn thiếu', formatCurrentTarget(fiber, TARGET.fiber, 'g'), 'Ưu tiên rau xanh hoặc đậu/ngũ cốc nguyên hạt ở bữa tới.', 10));
  }

  if (fat > TARGET.fat) {
    risks.push(riskItem('fat', 'bad', 'Fat đã vượt giới hạn', formatCurrentTarget(fat, TARGET.fat, 'g'), 'Nếu ăn thêm, chọn protein nạc và tránh đồ chiên/dầu.', 20));
  } else if (fat >= TARGET.fat * 0.9) {
    risks.push(riskItem('fat', 'warn', 'Fat gần giới hạn', formatCurrentTarget(fat, TARGET.fat, 'g'), 'Phần còn lại trong ngày nên hạn chế dầu, bơ, đồ chiên.', 20));
  }

  if (proteinLeft > 40) {
    risks.push(riskItem('protein', 'warn', 'Protein còn thiếu nhiều', formatCurrentTarget(protein, TARGET.protein, 'g'), 'Thêm protein nạc như ức gà, cá, trứng hoặc sữa chua Hy Lạp.', 30));
  } else if (proteinLeft > 15) {
    risks.push(riskItem('protein', 'warn', 'Protein còn thiếu', formatCurrentTarget(protein, TARGET.protein, 'g'), 'Bữa tiếp theo nên có một nguồn protein rõ ràng.', 30));
  }

  if (kcal <= 0) {
    risks.push(riskItem('kcal', 'missing', 'Chưa có log năng lượng', 'Chưa log bữa ăn', 'Gửi ảnh bữa ăn cho Claude để cập nhật đánh giá.', 40));
  } else if (kcalRemain > 600) {
    risks.push(riskItem('kcal', 'warn', 'Thiếu năng lượng khá nhiều', `${kcal.toLocaleString()} / ${TARGET.kcal.toLocaleString()} kcal`, 'Ăn thêm một bữa cân bằng, ưu tiên protein và chất xơ.', 40));
  } else if (kcalRemain > 150) {
    risks.push(riskItem('kcal', 'warn', 'Thiếu năng lượng nhẹ', `${kcal.toLocaleString()} / ${TARGET.kcal.toLocaleString()} kcal`, 'Có thể ăn thêm nhẹ, nhưng chọn theo macro còn thiếu.', 40));
  } else if (kcalRemain < -150) {
    risks.push(riskItem('kcal', 'bad', 'Vượt mục tiêu kcal', `${kcal.toLocaleString()} / ${TARGET.kcal.toLocaleString()} kcal`, 'Phần còn lại trong ngày nên ưu tiên nước, ngủ và vận động nhẹ.', 40));
  }

  const missing = [];
  if (missingData.water) missing.push('nước');
  if (missingData.sleep) missing.push('ngủ');
  if (missingData.steps) missing.push('vận động');
  if (missing.length) {
    risks.push(riskItem('missing', 'missing', 'Thiếu dữ liệu sinh hoạt', `Chưa log ${missing.join(', ')}`, 'Sync hoặc log nhanh để đánh giá hôm nay chính xác hơn.', 50));
  }

  const score = { bad: 3, warn: 2, missing: 1, good: 0 };
  return risks.sort((a, b) => {
    const sev = (score[b.severity] || 0) - (score[a.severity] || 0);
    return sev || a.priority - b.priority;
  });
}

function buildHealthNextAction(risks, metrics) {
  const has = type => risks.some(r => r.type === type);
  const missingCount = Object.values(metrics.missingData).filter(Boolean).length;
  if (has('fiber') && has('fat') && has('protein')) {
    return 'Bữa tiếp theo: rau/salad + protein nạc, tránh đồ chiên/dầu.';
  }
  if (has('fiber') && has('fat')) {
    return 'Thêm rau hoặc salad, nếu cần protein thì chọn nguồn nạc và tránh thêm dầu/mỡ.';
  }
  if (has('protein') && has('fat')) {
    return 'Bổ sung protein nạc vừa đủ, tránh món nhiều dầu vì fat đã gần giới hạn.';
  }
  if (has('protein') && has('kcal')) {
    return 'Ăn thêm một phần protein nạc vừa đủ kcal, không cần tăng fat.';
  }
  if (missingCount >= 2 && !risks.some(r => r.severity === 'bad')) {
    return 'Log/sync dữ liệu còn thiếu trước để đánh giá hôm nay chính xác hơn.';
  }
  const actionRisk = risks.find(r => r.type !== 'missing') || risks[0];
  return actionRisk ? actionRisk.action : 'Tiếp tục giữ nhịp ăn uống, nước, ngủ và vận động như hiện tại.';
}

function groupHealthActionBlocks(risks, metrics) {
  const has = t => risks.some(r => r.type === t);
  const blocks = [];
  if (has('fiber') || has('fat') || has('protein') || has('kcal')) {
    const summary = [
      has('fiber') ? 'chất xơ rất thấp' : '',
      has('fat') ? 'fat gần giới hạn' : '',
      has('protein') ? 'protein còn thiếu' : '',
      has('kcal') ? 'năng lượng chưa cân bằng' : ''
    ].filter(Boolean).join(', ');
    const chips = [];
    if (has('fiber')) chips.push({ tone: 'bad', text: `Chất xơ ${formatCurrentTarget(metrics.fiber, TARGET.fiber, 'g')}` });
    if (has('fat')) chips.push({ tone: 'warn', text: `Fat ${formatCurrentTarget(metrics.fat, TARGET.fat, 'g')}` });
    if (has('protein')) chips.push({ tone: 'warn', text: `Protein ${formatCurrentTarget(metrics.protein, TARGET.protein, 'g')}` });
    if (has('kcal')) chips.push({ tone: 'warn', text: `Kcal ${formatCurrentTarget(metrics.kcal, TARGET.kcal, '')}` });
    blocks.push({
      summary: summary ? summary[0].toUpperCase() + summary.slice(1) + '.' : 'Cần tối ưu dinh dưỡng hôm nay.',
      action: buildHealthNextAction(risks, metrics),
      chips
    });
  }
  if (metrics.missingData.water || metrics.missingData.sleep || metrics.missingData.steps) {
    const missing = [];
    if (metrics.missingData.water) missing.push('nước');
    if (metrics.missingData.sleep) missing.push('ngủ');
    if (metrics.missingData.steps) missing.push('vận động');
    blocks.push({
      summary: `Thiếu dữ liệu ${missing.join(', ')}.`,
      action: 'Sync hoặc log nhanh để đánh giá hôm nay chính xác hơn.',
      chips: [{ tone: 'warn', text: `Chưa log: ${missing.join(' / ')}` }]
    });
  }
  return blocks.slice(0, 2);
}

function buildHealthCoachInsight(shown, logs) {
  const kcal = totalKcal(shown);
  const protein = totalMacro(shown, 'protein');
  const carb = totalMacro(shown, 'carb');
  const fat = totalMacro(shown, 'fat');
  const fiber = totalMacro(shown, 'fiber');
  const missingData = {
    water: !(shown.water_ml > 0),
    sleep: !(shown.sleep_hours > 0),
    steps: !(shown.steps > 0)
  };
  const kcalRemain = TARGET.kcal - kcal;
  const proteinLeft = TARGET.protein - protein;
  const fatLeft = TARGET.fat - fat;
  const metrics = { shown, logs, kcal, protein, carb, fat, fiber, kcalRemain, proteinLeft, fatLeft, missingData };
  const ranked = rankHealthRisks(metrics);
  const status = ranked.some(r => r.severity === 'bad') ? 'bad'
    : ranked.some(r => r.severity === 'warn') ? 'warn'
    : ranked.length ? 'missing'
    : 'good';
  const topSummary = ranked.length
    ? ranked.slice(0, 3).map(r => r.title.toLowerCase()).join(', ')
    : 'đang đi đúng hướng hôm nay';
  const nextAction = buildHealthNextAction(ranked, metrics);

  const actionBlocks = groupHealthActionBlocks(ranked, metrics);
  return { status, risks: ranked, topSummary, nextAction, missingData, metrics, actionBlocks };
}

function renderHealthCoachBlock(insight) {
  const icon = insight.status === 'good'
    ? uiIcon('i-check', '', 'style="color:var(--vita-good)"')
    : (insight.status === 'bad'
      ? uiIcon('i-critical', '', 'style="color:var(--vita-bad)"')
      : insight.status === 'missing'
        ? uiIcon('i-alert', '', 'style="color:var(--vita-info)"')
        : uiIcon('i-alert', '', 'style="color:var(--vita-warn)"'));
  const statusClass = insight.status === 'good' ? '' : ` ${insight.status}`;
  const title = insight.status === 'good' ? 'Đang ổn hôm nay' : 'Cần xử lý hôm nay';
  const block = insight.actionBlocks?.[0];
  const reasons = block?.chips?.length
    ? `<div class="ih-sub">Lý do</div><div class="ih-reason">${block.chips.map(c => `<span class="ih-chip${c.tone ? ' '+c.tone : ''}">${esc(c.text)}</span>`).join('')}</div>`
    : '';
  const secondary = insight.actionBlocks?.[1]
    ? `<div class="ih-sub">Bổ sung</div><p style="margin-top:4px">${esc(insight.actionBlocks[1].summary)}</p><div class="ih-next" style="margin-top:5px">${esc(insight.actionBlocks[1].action)}</div>`
    : '';

  return `<div class="insight2${statusClass}">
    <div class="ih"><span>${icon}</span><span>${title}</span></div>
    <p>${esc(block?.summary || `Hôm nay: ${insight.topSummary}.`)}</p>
    <div class="ih-next">${esc(`Việc nên làm tiếp theo: ${block?.action || insight.nextAction}`)}</div>
    ${reasons}
    ${secondary}
  </div>`;
}

function renderHealth(logs) {
  if (!logs.length) return `<div class="loading">${uiIcon('i-health-heart', '', 'style="color:var(--vita-faint);width:26px;height:26px;margin-bottom:8px"')}<br>Chưa có dữ liệu sức khỏe<br>
    <span style="font-size:12px;color:var(--vita-faint);margin-top:8px;display:block">Gửi ảnh bữa ăn cho Claude để bắt đầu</span></div>
    <button onclick="debugFetch()" style="display:block;margin:8px auto;padding:8px 16px;background:rgba(255,255,255,.06);color:var(--vita-muted);border:none;border-radius:8px;font-size:12px;cursor:pointer">Test API</button>
    <pre id="dbg-out" style="display:none;background:var(--vita-surface);border-radius:8px;padding:12px;font-size:11px;white-space:pre-wrap;margin:8px 0;color:var(--vita-muted)"></pre>`;

  const today    = todayStr();
  const shown    = logs.find(l => l.date === today) || logs[0];

  const carb     = totalMacro(shown, 'carb');

  const fiber    = totalMacro(shown, 'fiber');
  const kcalPct  = Math.min(100, (kcal / TARGET.kcal) * 100);
  const remain   = TARGET.kcal - kcal;
  const coach    = buildHealthCoachInsight(shown, logs);
  const withW    = logs.filter(l => l.weight_kg > 0);
  const wLatest  = withW[0];
  const wFirst   = withW[withW.length - 1];
  const wDelta   = wFirst && wLatest ? +(wLatest.weight_kg - wFirst.weight_kg).toFixed(1) : null;

  // Hero calories
  const heroLabel = isToday ? 'Năng lượng hôm nay' : `Năng lượng · ${fmtFull(shown.date)}`;
  const remainStr = remain > 0 ? `Còn ${remain} kcal để đạt mục tiêu` : `Vượt ${-remain} kcal so với mục tiêu`;
  const heroTone = coach.status === 'bad' ? 'var(--vita-energy)'
    : coach.status === 'good' ? 'var(--vita-good)'
    : coach.status === 'missing' ? 'var(--vita-muted)'
    : 'var(--vita-warn)';
  const remainColor = remain > 0 ? 'var(--vita-warn)' : 'var(--vita-energy)';

  // Mini rings
  const sleepVal  = shown.sleep_hours || 0;
  const waterL    = shown.water_ml  > 0 ? +(shown.water_ml / 1000).toFixed(1) : 0;
  const waterMax  = TARGET.water_ml / 1000;
  const stepsK    = shown.steps > 0 ? +(shown.steps / 1000).toFixed(1) : 0;
  const stepsMaxK = TARGET.steps / 1000;
  const ringStatus = (ok, text) => ok ? '' : `<div class="ring-empty">${text}</div>`;

  // Macro balance rows
  const macroRows = [
    { key: 'protein', name: 'Protein', val: Math.round(protein), max: TARGET.protein, color: 'var(--vita-protein)', unit: 'g' },
    { key: 'carb', name: 'Carb', val: Math.round(carb), max: TARGET.carb, color: 'var(--vita-carb)', unit: 'g' },
    { key: 'fat', name: 'Fat', val: Math.round(fat), max: TARGET.fat, color: 'var(--vita-fat)', unit: 'g' },
    { key: 'fiber', name: 'Chất xơ', val: Math.round(fiber), max: TARGET.fiber, color: 'var(--vita-fiber)', unit: 'g' },
  ].map(m => {
    const pct = Math.min(100, m.max > 0 ? (m.val / m.max) * 100 : 0);
    const left = m.max - m.val;
    const leftStr = left > 0 ? `còn ${left}${m.unit}` : `đạt target`;
    const leftColor = left > 0 ? 'var(--vita-muted)' : 'var(--vita-good)';
    const valColor = m.val > 0 ? m.color : 'var(--vita-faint)';
    const valStr = formatCurrentTarget(m.val, m.max, m.unit);
    const risk = coach.risks.find(r => r.type === m.key);
    const rowClass = risk ? ` ${risk.severity}` : '';
    const statusText = formatMacroStatus(m.key, risk, left);
    const tone = risk ? risk.severity : (left > 0 ? 'warn' : 'good');
    const macroIcon = m.name === 'Protein'
      ? '<svg class="ui-ico" viewBox="0 0 24 24"><use href="#i-health-heart"/></svg>'
      : (m.name === 'Chất xơ'
        ? '<svg class="ui-ico" viewBox="0 0 24 24"><use href="#i-fiber-leaf"/></svg>'
        : '');
    return `<div class="macro-row${rowClass}">
      <div class="macro-name" style="color:${valColor}">${macroIcon}<span>${m.name}</span> <strong>${valStr}</strong></div>
      <div class="macro-pbar"><div class="macro-pfill" style="width:${pct}%;background:${m.color}"></div></div>
      <div class="macro-remain ${tone}"${risk ? '' : ` style="color:${leftColor}"`}>${statusText}</div>
    </div>`;
  }).join('');

  // Coach card
  const insightHtml = renderHealthCoachBlock(coach);

  // Weight card
  const weightVal = wLatest ? `${wLatest.weight_kg}<span class="b-unit">kg</span>` : '<span style="color:var(--vita-faint)">chưa log</span>';
  const weightSub = wDelta !== null
    ? `<span style="color:${wDelta<0?'var(--vita-good)':wDelta>0?'var(--vita-energy)':'var(--vita-muted)'};font-weight:700">${wDelta>0?'↑':'↓'} ${Math.abs(wDelta)}kg / ${currentRange}d</span>`
    : `<span style="color:var(--vita-faint)">chưa có</span>`;

  return `
  <!-- Hero calories -->
  <div class="hero-cal ${coach.status} b span4" style="min-height:auto;margin-bottom:0">
    <div class="hero-cal-label">${heroLabel}</div>
    <div class="hero-cal-inner">
      <div>${renderRing(kcal, TARGET.kcal, heroTone, 'kcal', 72)}</div>
      <div class="hero-cal-text">
        <div class="hero-cal-val" style="color:${heroTone}">${kcal.toLocaleString()}</div>
        <div class="hero-cal-target">/ ${TARGET.kcal.toLocaleString()} kcal mục tiêu</div>
        <div class="hero-cal-remain" style="color:${remainColor}">${remainStr}</div>
        <div class="hero-cal-diagnosis">${esc(`Đánh giá: ${coach.topSummary}.`)}</div>
      </div>
    </div>
    <div class="hero-pbar" style="margin-top:12px"><div style="width:${kcalPct}%;background:linear-gradient(90deg,${heroTone},var(--vita-carb))"></div></div>
  </div>

  <!-- Coach insight -->
  ${insightHtml}

  <!-- Mini rings -->
  <div class="ring-grid" style="margin-top:var(--vita-gap)">
    <div class="ring-cell">
      ${renderRing(Math.round(protein), TARGET.protein, 'var(--vita-protein)', 'Protein', 52)}
    </div>
    <div class="ring-cell">
      ${renderRing(waterL, waterMax, 'var(--vita-water)', 'Nước (L)', 52, 1, 'Log')}
      ${ringStatus(shown.water_ml > 0, 'Chưa log')}
    </div>
    <div class="ring-cell">
      ${renderRing(sleepVal, TARGET.sleep, 'var(--vita-sleep)', 'Giấc ngủ', 52, 1, 'Log')}
      ${ringStatus(shown.sleep_hours > 0, 'Chưa log')}
    </div>
    <div class="ring-cell">
      ${renderRing(stepsK, stepsMaxK, 'var(--vita-steps)', 'Vận động', 52, 0, 'Sync')}
      ${ringStatus(shown.steps > 0, 'Chưa đồng bộ')}
    </div>
  </div>

  <!-- Macro balance -->
  <div class="macro-card" style="margin-top:var(--vita-gap)">
    <div class="b-label">Dinh dưỡng chính</div>
    ${macroRows}
  </div>

  <div class="stitle">Tổng kết dinh dưỡng</div>
  ${renderNutritionHistory(logs)}

  <!-- Weight + Weekly compare -->
  <div class="bento" style="margin-top:var(--vita-gap)">
    <div class="b b-weight span2" style="background:linear-gradient(135deg,#0E2A1F,#0A2018);border:1px solid rgba(48,209,88,.18)">
      <div class="b-label">Cân nặng</div>
      <div class="b-val">${weightVal}</div>
      <div class="b-sub">${weightSub}</div>
      <div class="b-ico">${uiIcon('i-scale', '', 'style="color:var(--vita-weight)"')}</div>
    </div>
    <div class="b span2" style="background:linear-gradient(135deg,#14142A,#0F0F1F);border:1px solid rgba(142,124,255,.18)">
      <div class="b-label">Giấc ngủ</div>
      <div class="b-val" style="color:${sleepVal > 0 ? 'var(--vita-sleep)' : 'var(--vita-faint)'};font-size:${sleepVal > 0 ? '28px' : '18px'}">${sleepVal > 0 ? sleepVal.toFixed(1) : 'Chưa log'}<span class="b-unit">${sleepVal > 0 ? 'h' : ''}</span></div>
      <div class="b-sub">${sleepVal > 0 ? `${pc(sleepVal, TARGET.sleep)}% mục tiêu` : 'chưa log'}</div>
      <div class="b-ico">${uiIcon('i-sleep', '', 'style="color:var(--vita-sleep)"')}</div>
    </div>

    ${renderWeeklySummary(logs)}

    <!-- Chart: calo -->
    <div class="b b-chart span4 tall">
      <div class="b-label">${uiIcon('i-chart-line')}Calo / ngày · ${currentRange} ngày</div>
      <div class="chart-wrap"><canvas id="c-cal"></canvas></div>
    </div>

    ${withW.length > 1 ? `<div class="b b-chart span4 tall">
      <div class="b-label">${uiIcon('i-scale')}Cân nặng (kg)</div>
      <div class="chart-wrap"><canvas id="c-weight"></canvas></div>
    </div>` : ''}

    <div class="b b-chart span2 tall">
      <div class="b-label">${uiIcon('i-sleep')}Giấc ngủ</div>
      <div class="chart-wrap"><canvas id="c-sleep"></canvas></div>
    </div>
    <div class="b b-chart span2 tall">
      <div class="b-label">${uiIcon('i-steps')}Vận động</div>
      <div class="chart-wrap"><canvas id="c-steps"></canvas></div>
    </div>
    <div class="health-tail-space"></div>
  </div>`;
}

function renderInsight(shown, kcal, protein, fiber) {
  const tips = [];
  let hasSevere = false;
  const proteinLeft = TARGET.protein - protein;
  const waterOk     = shown.water_ml > 0;
  const sleepOk     = shown.sleep_hours >= 7;

  if (protein < TARGET.protein * 0.4) {
    hasSevere = true;
    tips.push(`Protein chỉ đạt ${Math.round(protein)}g / ${TARGET.protein}g — bữa tối ưu tiên thịt/cá/trứng, tránh thêm carb`);
  } else if (proteinLeft > 30)
    tips.push(`Còn thiếu ${Math.round(proteinLeft)}g protein — thêm 1-2 phần thịt hoặc trứng`);

  if (!waterOk)
    tips.push('Chưa log nước uống hôm nay');

  if (fiber < 10)
    tips.push('Chất xơ rất thấp — thêm rau xanh hoặc salad vào bữa tiếp');

  if (kcal > TARGET.kcal * 0.9 && proteinLeft > 50)
    tips.push('Gần đạt calo nhưng thiếu protein — ưu tiên thức ăn giàu protein thấp carb');

  if (!sleepOk && shown.sleep_hours > 0)
    tips.push(`Ngủ ${shown.sleep_hours}h — dưới mục tiêu, ảnh hưởng phục hồi và kiểm soát cân nặng`);

  const status = hasSevere ? 'bad' : (tips.length > 0 ? 'warn' : 'good');
  const icon = status === 'good'
    ? uiIcon('i-check', '', 'style="color:var(--vita-good)"')
    : (status === 'warn'
      ? uiIcon('i-alert', '', 'style="color:var(--vita-warn)"')
      : uiIcon('i-critical', '', 'style="color:var(--vita-bad)"'));
  const statusClass = status === 'good' ? '' : ` ${status}`;
  const body = tips.length === 0
    ? 'Đang đi đúng hướng hôm nay'
    : tips.length === 1 ? tips[0] : `${tips.length} điểm cần lưu ý hôm nay`;
  const tipsHtml = tips.length > 1
    ? `<div class="ih-tips">${tips.map(t => `<div class="ih-tip">• ${esc(t)}</div>`).join('')}</div>`
    : '';

  return `<div class="insight2${statusClass}">
    <div class="ih"><span>${icon}</span><span>Nhận xét hôm nay</span></div>
    <p>${esc(body)}</p>
    ${tipsHtml}
  </div>`;
}

function renderDayAcc(l, open) {
  const kcal = totalKcal(l);
  const meals = l.meals || [];
  const mealRows = meals.map(renderMealCard).join('');

  return `<details class="day-acc" ${open?'open':''}>
    <summary>
      <span class="da-date">${fmt(l.date)}</span>
      <span class="da-meta">${meals.length} bữa</span>
      <span class="da-kcal">${kcal} kcal</span>
      <span class="da-chev">▾</span>
    </summary>
    <div class="da-body">${mealRows || '<div style="color:var(--vita-faint);font-size:13px;padding:8px 0">Chưa có bữa nào</div>'}</div>
  </details>`;
}

function renderMealCard(meal) {
  const items = meal.items || [];
  const protein = Math.round(getMealMacro(meal, 'protein'));
  const carb = Math.round(getMealMacro(meal, 'carb'));
  const fat = Math.round(getMealMacro(meal, 'fat'));
  const totalMacro = Math.max(1, protein + carb + fat);
  const topItems = [...items].sort((a, b) => (b.kcal || 0) - (a.kcal || 0)).slice(0, 2);
  const hiddenCount = Math.max(0, items.length - topItems.length);
  const diagnosis = mealDiagnosis(meal, protein, carb, fat);
  const topRows = topItems.map(it => `<div class="meal-top-row"><span>${esc(it.name)}</span><span>${it.kcal || 0}</span></div>`).join('');
  const itemRows = items.map(it => {
    const ico = meal.source === 'receipt' || meal.source === 'bill' ? uiIcon('i-wallet') : uiIcon('i-flame');
    return `<div class="mi">
      <div class="mi-ico">${ico}</div>
      <div class="mi-info">
        <div class="mi-name">${esc(it.name)}</div>
        <div class="mi-mac">${getItemGrams(it)}g · P:${getItemMacro(it,'protein')}g C:${getItemMacro(it,'carb')}g F:${getItemMacro(it,'fat')}g</div>
      </div>
      <div class="mi-kcal">${it.kcal || 0}</div>
    </div>`;
  }).join('');

  return `<details class="meal-card">
    <summary>
      <span class="meal-g-name">${esc(meal.name || meal.time || '—')}</span>
      <span class="meal-g-kcal">${(meal.total_kcal || 0).toLocaleString()} kcal</span>
      <div class="meal-g-sub">${items.length} món · P${protein}g C${carb}g F${fat}g · ${diagnosis}</div>
      <div class="macro-strip" style="--p:${protein / totalMacro}fr;--c:${carb / totalMacro}fr;--f:${fat / totalMacro}fr">
        <i class="mp"></i><i class="mc"></i><i class="mf"></i>
      </div>
      <div class="meal-top">
        ${topRows || '<div class="meal-top-row"><span>Chưa có món</span><span>—</span></div>'}
        ${hiddenCount ? `<div class="meal-top-row" style="color:var(--vita-muted)"><span>+${hiddenCount} món khác</span><span></span></div>` : ''}
      </div>
    </summary>
    <div class="meal-body">${itemRows || '<div style="color:var(--vita-faint);font-size:13px;padding:8px 0">Chưa có món</div>'}</div>
  </details>`;
}

function mealDiagnosis(meal, protein, carb, fat) {
  const kcal = meal.total_kcal || 0;
  if (protein >= 35 && protein >= carb * 0.7) return 'protein tốt';
  if (carb >= protein + fat && carb >= 45) return 'carb cao';
  if (fat >= 30 && fat >= protein) return 'fat cao';
  if (kcal >= 500 && protein < 20) return 'calo cao, protein thấp';
  return 'cân bằng';
}

function renderNutritionHistory(logs) {
  const weeks = groupLogsByWeek(logs);
  return weeks.map(week => renderWeekAcc(week)).join('');
}

function groupLogsByWeek(logs) {
  const map = new Map();
  logs.forEach(log => {
    const start = weekStart(log.date);
    const key = isoLocal(start);
    const end = addDays(start, 6);
    if (!map.has(key)) map.set(key, { start, end, logs: [] });
    map.get(key).logs.push(log);
  });
  return [...map.values()]
    .map(week => ({ ...week, logs: week.logs.sort((a, b) => b.date.localeCompare(a.date)) }))
    .sort((a, b) => isoLocal(b.start).localeCompare(isoLocal(a.start)));
}

function weekStart(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return d;
}

function weekLabel(start, end) {
  const today = new Date();
  const thisStart = weekStart(isoLocal(today));
  const prevStart = addDays(thisStart, -7);
  const key = isoLocal(start);
  if (key === isoLocal(thisStart)) return 'Tuần này';
  if (key === isoLocal(prevStart)) return 'Tuần trước';
  return `${fmt(isoLocal(start))} - ${fmt(isoLocal(end))}`;
}

function renderWeekAcc(week) {
  const logs = week.logs;
  const days = logs.length;
  const avgKcal = avg(logs, totalKcal);
  const proteinHit = logs.filter(l => totalMacro(l, 'protein') >= TARGET.protein).length;
  const fiberLow = logs.filter(l => totalMacro(l, 'fiber') < TARGET.fiber * 0.6).length;
  const kcalDelta = avgKcal - TARGET.kcal;
  const kcalTone = Math.abs(kcalDelta) < 150 ? 'Gần mục tiêu' : (kcalDelta > 0 ? `Vượt TB: ${Math.round(kcalDelta)} kcal/ngày` : `Thiếu TB: ${Math.round(Math.abs(kcalDelta))} kcal/ngày`);
  const kcalToneClass = Math.abs(kcalDelta) < 150 ? '' : ' warn';
  const outlier = logs
    .map(l => ({ log: l, delta: Math.abs(totalKcal(l) - TARGET.kcal) }))
    .sort((a, b) => b.delta - a.delta)[0]?.log;
  const outlierText = outlier ? `${fmt(outlier.date)} · ${totalKcal(outlier).toLocaleString()} kcal` : '—';
  const proteinMiss = days - proteinHit;
  const proteinTone = proteinHit >= Math.ceil(days * 0.7) ? `Protein ổn: ${proteinHit}/${days} ngày` : `Protein hụt: ${proteinMiss}/${days} ngày`;
  const fiberTone = fiberLow > 0 ? `Fiber thấp: ${fiberLow}/${days} ngày` : 'Fiber ổn';
  const trendText = Math.abs(kcalDelta) < 150 && proteinMiss <= Math.floor(days * 0.3) && fiberLow === 0
    ? 'Xu hướng: tuần này khá ổn.'
    : `Xu hướng: ${[
        Math.abs(kcalDelta) >= 150 ? 'năng lượng lệch mục tiêu' : '',
        proteinMiss ? 'protein hụt lặp lại' : '',
        fiberLow ? 'fiber thấp nhiều ngày' : ''
      ].filter(Boolean).join(', ')}.`;
  const dayRows = logs.map(l => renderDayAcc(l, false)).join('');

  return `<details class="week-acc">
    <summary>
      <div>
        <div class="wh-title">${weekLabel(week.start, week.end)}</div>
        <div class="wh-range">${fmt(isoLocal(week.start))} - ${fmt(isoLocal(week.end))} · ${days} ngày có log</div>
      </div>
      <div class="wh-kcal">${Math.round(avgKcal).toLocaleString()}<small>kcal/ngày</small></div>
      <div class="wh-meta">
        <div class="wh-line"><span>Đánh giá</span><strong>${trendText}</strong></div>
        <div class="wh-line"><span>Cần nhìn</span><strong>${fiberLow > 0 ? 'Ưu tiên chất xơ' : 'Duy trì nhịp hiện tại'}</strong></div>
      </div>
      <div class="wh-chips">
        <span class="wh-chip${kcalToneClass}">${kcalTone}</span>
        <span class="wh-chip${proteinMiss ? ' warn' : ''}">${proteinTone}</span>
        <span class="wh-chip${fiberLow ? ' bad' : ''}">${fiberTone}</span>
        <span class="wh-chip">Lệch nhất: ${outlierText}</span>
      </div>
    </summary>
    <div class="week-body">${dayRows}</div>
  </details>`;
}

function renderWeeklySummary(logs) {
  if (logs.length < 4) return '';
  const today = new Date();
  const cutThis = isoLocal(addDays(today,-7));
  const cutPrev = isoLocal(addDays(today,-14));
  const thisWk = logs.filter(l => l.date >  cutThis);
  const prevWk = logs.filter(l => l.date <= cutThis && l.date > cutPrev);
  if (!thisWk.length) return '';
  const metrics = [
    { lbl:'Kcal/ngày', f:l=>totalKcal(l),          fmt:v=>Math.round(v).toLocaleString() },
    { lbl:'Protein',   f:l=>totalMacro(l,'protein'), fmt:v=>Math.round(v)+'g' },
    { lbl:'Giấc ngủ',  f:l=>l.sleep_hours||0,        fmt:v=>v.toFixed(1)+'h' },
    { lbl:'Vận động',  f:l=>l.steps||0,              fmt:v=>(v/1000).toFixed(1)+'k bước' }
  ];
  const rows = metrics.map(m => {
    const cur  = avg(thisWk, m.f);
    const prv  = avg(prevWk, m.f);
    const diff = prv > 0 ? (cur - prv) / prv * 100 : 0;
    const arrow = Math.abs(diff) < 3 ? '→' : (diff > 0 ? '↑' : '↓');
    const color = Math.abs(diff) < 3 ? 'var(--vita-muted)' : (diff > 0 ? 'var(--vita-good)' : 'var(--vita-energy)');
    const dlabel = prv > 0 ? `${arrow} ${Math.abs(diff).toFixed(0)}%` : '—';
    return `<div class="is-row">
      <span class="is-lbl">${m.lbl}</span>
      <span class="is-val">${m.fmt(cur)}</span>
      <span class="is-delta" style="color:${color}">${dlabel}</span>
    </div>`;
  }).join('');
  return `<div class="b b-insight span4" style="background:linear-gradient(135deg,#0E1A2A,#0F1A28);border:1px solid rgba(90,200,250,.15)">
    <div class="b-label" style="color:var(--vita-info)">So với tuần trước</div>
    ${rows}
  </div>`;
}

function drawHealth(logs) {
  const o = [...logs].reverse(), lb = o.map(l => shortDate(l.date));
  drawBar('c-cal',    lb, o.map(l=>totalKcal(l)),       'var(--vita-energy)', TARGET.kcal);
  drawLine('c-weight',lb, o.map(l=>l.weight_kg||0),     'var(--vita-weight)', 73);
  drawLine('c-sleep', lb, o.map(l=>l.sleep_hours||0),   'var(--vita-sleep)',  TARGET.sleep);
  drawBar('c-steps',  lb, o.map(l=>(l.steps||0)/1000),  'var(--vita-steps)',  TARGET.steps/1000);
}

const TYPE_META = {
  gym:      {ico:uiIcon('i-dumbbell'),color:'#BF5AF2'}, cardio:   {ico:uiIcon('i-steps'),color:'#FF453A'},
  yoga:     {ico:uiIcon('i-vita-shield'),color:'#FF375F'}, swim:     {ico:uiIcon('i-water'),color:'#0A84FF'},
  bike:     {ico:uiIcon('i-steps'),color:'#FF9F0A'}, muay_thai:{ico:uiIcon('i-dumbbell'),color:'#FF453A'},
  other:    {ico:uiIcon('i-spark-line'),color:'#8E8E93'}
};

const WEEKLY_WORKOUT_MIN_TARGET = 60;

function normalizeWorkoutTypeLabel(type) {
  const t = String(type || '').toLowerCase().replace(/\s+/g, '_');
  if (t.includes('muay')) return 'Muay Thai';
  if (t.includes('gym')) return 'Gym';
  if (t.includes('mobility')) return 'Mobility';
  if (t.includes('recovery')) return 'Recovery';
  if (t.includes('walk')) return 'Walk';
  if (t.includes('cardio')) return 'Cardio';
  return t ? t.split('_').map(w => w ? w[0].toUpperCase() + w.slice(1) : '').join(' ') : 'Khác';
}

function summarizeWorkoutWeek(workoutLogs) {
  const sessions = workoutLogs.flatMap(l => (l.sessions || []).map(s => ({ ...s, date: l.date })));
  const activeDays = new Set(sessions.map(s => s.date)).size;
  const totalMinutes = sessions.reduce((sum, s) => sum + (Number(s.duration_min) || 0), 0);
  const totalKcal = sessions.reduce((sum, s) => sum + (Number(s.calories) || 0), 0);
  const minutesByDay = {};
  const typeStats = {};
  sessions.forEach(s => {
    minutesByDay[s.date] = (minutesByDay[s.date] || 0) + (Number(s.duration_min) || 0);
    const label = normalizeWorkoutTypeLabel(s.type);
    if (!typeStats[label]) typeStats[label] = { count: 0, minutes: 0 };
    typeStats[label].count += 1;
    typeStats[label].minutes += Number(s.duration_min) || 0;
  });
  return { sessions, activeDays, totalMinutes, totalKcal, typeStats, minutesByDay };
}

function buildWorkoutCoachInsight(workoutLogs, healthLogs) {
  const summary = summarizeWorkoutWeek(workoutLogs);
  const { sessions, activeDays, totalMinutes, typeStats } = summary;
  const met = totalMinutes >= WEEKLY_WORKOUT_MIN_TARGET;
  let status = met ? 'good' : 'warn';
  let diagnosis = '';
  if (!sessions.length) diagnosis = 'Tuần này chưa có hoạt động tập luyện.';
  else if (activeDays >= 3 && !met) diagnosis = `Tuần này: tần suất tốt, nhưng thời lượng còn thấp (${totalMinutes}/${WEEKLY_WORKOUT_MIN_TARGET} phút).`;
  else if (activeDays < 2 && !met) diagnosis = `Tuần này: cần tăng tần suất và thời lượng (${activeDays} ngày có tập).`;
  else diagnosis = `Tuần này: đạt mục tiêu vận động (${totalMinutes}/${WEEKLY_WORKOUT_MIN_TARGET} phút).`;
  if (!sessions.length) status = 'missing';

  const sleepToday = healthLogs?.[0]?.sleep_hours || 0;
  const mainType = Object.entries(typeStats).sort((a, b) => b[1].minutes - a[1].minutes)[0]?.[0] || '';
  let nextAction = '';
  if (!sessions.length) nextAction = 'Bắt đầu bằng 15-20 phút đi bộ nhanh hoặc mobility nhẹ.';
  else if (activeDays >= 3 && !met) nextAction = 'Thêm 20-30 phút vận động nhẹ hoặc mobility hôm nay.';
  else if (mainType === 'Muay Thai' && !typeStats.Mobility && !typeStats.Recovery) nextAction = 'Thêm 10-15 phút mobility hoặc giãn cơ để hỗ trợ phục hồi.';
  else if (!met) nextAction = 'Buổi tới tập full-body nhẹ 25-30 phút, ưu tiên push/pull/legs.';
  else nextAction = 'Duy trì nhịp tập hiện tại và thêm một buổi recovery nhẹ nếu thấy mỏi.';

  const reasonChips = [`${totalMinutes}/${WEEKLY_WORKOUT_MIN_TARGET} phút`, `${activeDays} ngày có tập`, `${sessions.length} hoạt động`];
  const gymMin = typeStats.Gym?.minutes || 0;
  if (gymMin > 0) reasonChips.push(`Gym ${gymMin} phút`);
  const recoveryNote = sleepToday <= 0
    ? 'Chưa có dữ liệu ngủ hôm nay, nên chưa đánh giá phục hồi chính xác.'
    : (sleepToday < 6 ? 'Ngủ thấp, buổi tới nên giảm intensity hoặc ưu tiên mobility.' : '');
  return { ...summary, status, diagnosis, nextAction, reasonChips, recoveryNote };
}

function renderWorkoutTypeBreakdown(summary) {
  const preferred = ['Muay Thai', 'Gym', 'Mobility', 'Recovery'];

    const stat = summary.typeStats[label] || { count: 0, minutes: 0 };

  });
  Object.entries(summary.typeStats).forEach(([label, stat]) => {
    if (seen.has(label)) return;
    rows.push(`<div class="is-row"><span class="is-lbl">${label}</span><span class="is-val">${stat.count} hoạt động</span><span class="is-delta">${stat.minutes} phút</span></div>`);

function formatExerciseSet(exercise, set) {
  const reps = Number(set?.reps) || Number(exercise?.reps) || 0;
  const weightRaw = set?.weight_kg ?? exercise?.weight_kg;
  const weight = Number(weightRaw);
  const hasWeight = Number.isFinite(weight) && weight > 0;
  const name = String(exercise?.name || '').toLowerCase();
  const bodyweight = /ab wheel|push up|pull up|plank|burpee|bodyweight/.test(name) || String(weightRaw).toLowerCase() === 'bodyweight';
  if (!reps) return '';
  if (hasWeight) return `${reps} reps x ${weight}kg`;
  if (bodyweight) return `${reps} reps · bodyweight`;
  return `${reps} reps · chưa nhập tạ`;
}

// ══ CHART ENGINE ══
function setupCanvas(id, h=140) {
  const c=document.getElementById(id); if (!c) return null;
  const dpr=window.devicePixelRatio||1, W=c.parentElement.offsetWidth||300;
  c.style.width=W+'px'; c.style.height=h+'px'; c.width=W*dpr; c.height=h*dpr;
  const ctx=c.getContext('2d'); ctx.scale(dpr,dpr); return {ctx,W,H:h};
}
function noData(ctx,W,H) {
  ctx.fillStyle='#5F6675'; ctx.font='12px -apple-system'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Chưa có dữ liệu',W/2,H/2);
}
function resolveCSSColor(color) {
  if (!color.startsWith('var(')) return color;
  const name = color.match(/var\(([^)]+)\)/)?.[1];
  return name ? getComputedStyle(document.documentElement).getPropertyValue(name).trim() : '#888';
}

function drawBar(id, labels, data, color, goal=null) {
  const s=setupCanvas(id); if (!s) return;
  const {ctx,W,H}=s; ctx.clearRect(0,0,W,H);
  if (data.every(v=>!v)) { noData(ctx,W,H); return; }
  const c = resolveCSSColor(color);
  const pad={t:22,r:10,b:26,l:34}, cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const max=Math.max(...data,goal||0)*1.2||1;
  if (goal) {
    const gy=pad.t+ch-(goal/max)*ch;
    ctx.setLineDash([4,3]); ctx.strokeStyle=c+'66'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pad.l,gy); ctx.lineTo(W-pad.r,gy); ctx.stroke(); ctx.setLineDash([]);
  }
  [0,.5,1].forEach(t=>{
    const y=pad.t+ch*t; ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#5F6675'; ctx.font='9px -apple-system'; ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText((max*(1-t)).toFixed(max>10?0:1),pad.l-3,y);
  });
  const n=labels.length, slotW=cw/Math.max(n,1), barW=Math.min(slotW*.6,28);
  data.forEach((v,i)=>{
    const x=pad.l+slotW*i+(slotW-barW)/2, bh=(v/max)*ch, y=pad.t+ch-bh, now=i===n-1;
    ctx.fillStyle=now?c:c+'66';
    if (bh>0) {
      ctx.beginPath(); const r=4; ctx.moveTo(x+r,y); ctx.lineTo(x+barW-r,y);
      ctx.quadraticCurveTo(x+barW,y,x+barW,y+r); ctx.lineTo(x+barW,pad.t+ch);
      ctx.lineTo(x,pad.t+ch); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.fill();
    }
    if (v>0) { ctx.fillStyle='#E5E5EA'; ctx.font=`${now?'bold ':''} 9px -apple-system`; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(v%1===0?v:v.toFixed(1),x+barW/2,y-2); }
    ctx.fillStyle=now?'#FFFFFF':'#9BA1AE'; ctx.font=`${now?'bold ':''} 9px -apple-system`; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(labels[i],x+barW/2,H-2);
  });
}

function drawLine(id, labels, data, color, goal=null) {
  const s=setupCanvas(id); if (!s) return;
  const {ctx,W,H}=s; ctx.clearRect(0,0,W,H);
  const c = resolveCSSColor(color);
  const nz=data.filter(v=>v>0); if (!nz.length) { noData(ctx,W,H); return; }
  const pad={t:22,r:10,b:26,l:36}, cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const max=Math.max(...nz,goal||0)*1.15, min=Math.min(...nz)*.85, rng=max-min||1;
  if (goal) {
    const gy=pad.t+ch-((goal-min)/rng)*ch; ctx.setLineDash([4,3]); ctx.strokeStyle=c+'55'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pad.l,gy); ctx.lineTo(W-pad.r,gy); ctx.stroke(); ctx.setLineDash([]);
  }
  [0,.5,1].forEach(t=>{
    const y=pad.t+ch*t; ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#5F6675'; ctx.font='9px -apple-system'; ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText((max-rng*t).toFixed(1),pad.l-3,y);
  });
  const n=labels.length;
  const pts=data.map((v,i)=>({x:pad.l+(n>1?(i/(n-1))*cw:cw/2), y:v>0?pad.t+ch-((v-min)/rng)*ch:null}));
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,c+'40'); grad.addColorStop(1,c+'00');
  ctx.beginPath(); let ok=false;
  pts.forEach(p=>{ if(!p.y)return; if(!ok){ctx.moveTo(p.x,pad.t+ch);ctx.lineTo(p.x,p.y);ok=true;}else ctx.lineTo(p.x,p.y); });
  const lp=[...pts].reverse().find(p=>p.y); if(lp) ctx.lineTo(lp.x,pad.t+ch);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.strokeStyle=c; ctx.lineWidth=2.5; ctx.lineJoin='round';
  let ls=false; pts.forEach(p=>{ if(!p.y){ls=false;return;} if(!ls){ctx.moveTo(p.x,p.y);ls=true;}else ctx.lineTo(p.x,p.y); });
  ctx.stroke();
  pts.forEach((p,i)=>{
    if (!p.y) return;
    ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.fillStyle='#090A0F'; ctx.strokeStyle=c; ctx.lineWidth=2; ctx.fill(); ctx.stroke();
    ctx.fillStyle='#E5E5EA'; ctx.font='9px -apple-system'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    if (data[i]) ctx.fillText(data[i]%1===0?data[i]:data[i].toFixed(1),p.x,p.y-5);
  });
  labels.forEach((l,i)=>{
    const x=pad.l+(n>1?(i/(n-1))*cw:cw/2);
    ctx.fillStyle=i===n-1?'#FFFFFF':'#9BA1AE'; ctx.font=`${i===n-1?'bold ':''} 9px -apple-system`;
    ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(l,x,H-2);
  });
}

// ══ PR helpers ══
function epley(weight, reps) { return weight * (1 + reps/30); }
function extractSets(ex) {
  if (Array.isArray(ex.sets)) return ex.sets.filter(s => s.reps && s.weight_kg);
  if (typeof ex.sets === 'number' && ex.reps && ex.weight_kg)
    return Array.from({length:ex.sets}, () => ({reps:ex.reps, weight_kg:ex.weight_kg}));
  return [];
}
function computePRs(logs) {
  const byEx = {};
  logs.slice().reverse().forEach(l => {
    (l.sessions||[]).forEach(s => {
      (s.exercises||[]).forEach(ex => {
        const sets = extractSets(ex);
        if (!sets.length) return;
        const name = ex.name;
        if (!byEx[name]) byEx[name] = { maxWeight: null, max1RM: null, lastDate: l.date };
        byEx[name].lastDate = l.date;
        sets.forEach(st => {
          const e1 = epley(st.weight_kg, st.reps);
          if (!byEx[name].maxWeight || st.weight_kg > byEx[name].maxWeight.w) {
            byEx[name].maxWeight = { w:st.weight_kg, r:st.reps, d:l.date, isNew:!!byEx[name].maxWeight };
          }
          if (!byEx[name].max1RM || e1 > byEx[name].max1RM.e) {
            byEx[name].max1RM = { e:e1, w:st.weight_kg, r:st.reps, d:l.date, isNew:!!byEx[name].max1RM };
          }
        });
      });
    });
  });
  return byEx;
}

// ══ Streak ══
function computeStreak(idxDesc) {
  if (!idxDesc?.length) return 0;
  const today = todayStr();
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = isoLocal(y);
  let start = idxDesc.includes(today) ? today : idxDesc.includes(yesterday) ? yesterday : null;
  if (!start) return 0;
  let count = 0, cursor = new Date(start+'T12:00:00');
  while (idxDesc.includes(isoLocal(cursor))) { count++; cursor.setDate(cursor.getDate()-1); }
  return count;
}
function renderStreakBadge() {
  const all = [...new Set([...healthIdx,...workoutIdx,...financeIdx])].sort((a,b)=>b.localeCompare(a));
  const s = computeStreak(all);
  const el = document.getElementById('streak-badge');
  if (!el) return;
  el.innerHTML = s > 0 ? `<span class="streak-pill">${uiIcon('i-flame')} ${s}</span>` : '';
}

// ══ Schema normalize ══
function getItemGrams(it) { return it.grams ?? it.amount_g ?? 0; }
function getItemMacro(it, key) { return it[key] ?? it[key+'_g'] ?? 0; }
function getMealMacro(meal, key) { return meal['total_'+key] ?? meal['total_'+key+'_g'] ?? 0; }
function totalKcal(log) { return (log.meals||[]).reduce((s,m)=>s+(m.total_kcal||0),0); }
function totalMacro(log,k) { return (log.meals||[]).reduce((s,m)=>s+getMealMacro(m,k),0); }
function validateHealthLog(log) {
  const issues = [];
  (log.meals||[]).forEach(m => (m.items||[]).forEach(it => {
    if (it.grams==null && it.amount_g==null) issues.push(`missing grams: "${it.name}"`);
    if (it.protein==null && it.protein_g==null) issues.push(`missing protein: "${it.name}"`);
    if (it.carb==null && it.carb_g==null) issues.push(`missing carb: "${it.name}"`);
    if (it.fat==null && it.fat_g==null) issues.push(`missing fat: "${it.name}"`);
  }));
  if (issues.length) console.warn('[opus-nexus] non-canonical health schema', log.date, issues);
}

// ══ Helpers ══
const DAYS = ['CN','T2','T3','T4','T5','T6','T7'];
function shortDate(s) { const d=new Date(s+'T12:00:00'); return DAYS[d.getDay()]; }
function fmt(s) { const d=new Date(s+'T12:00:00'); return `${DAYS[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`; }
function fmtFull(s) { const d=new Date(s+'T12:00:00'); return `${DAYS[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`; }
function todayStr() { return isoLocal(new Date()); }
function isoLocal(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function addDays(d,n) { const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function avg(arr,fn) { const v=arr.map(fn).filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; }
function pc(v,max) { return Math.min(100,(v/max)*100).toFixed(0); }
function vnd(n) { if(n>=1000000)return(n/1000000).toFixed(1)+'tr'; if(n>=1000)return Math.round(n/1000)+'k'; return n+''; }
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }

// ── Debug ──
async function debugFetch() {
  const out = document.getElementById('dbg-out');
  out.style.display = 'block';
  const today = todayStr();
  out.textContent = `Local date: ${today}\nPAT: ${PAT ? PAT.slice(0,20)+'...' : '(empty)'}\n\n`;
  const url = `https://api.github.com/repos/${DATA_REPO}/contents/health-data/index.json?ref=${DATA_BRANCH}`;
  try {
    const r = await fetch(url, { headers: { 'Authorization': `Bearer ${PAT}`, 'Accept': 'application/vnd.github.v3+json' } });
    out.textContent += `HTTP ${r.status} ${r.statusText}\n`;
    const body = await r.json();
    if (r.ok) {
      const bytes = Uint8Array.from(atob(body.content.replace(/\n/g,'')), c => c.charCodeAt(0));
      out.textContent += `index.json: ${new TextDecoder().decode(bytes)}`;
    } else { out.textContent += `Error: ${body.message}`; }
  } catch(e) { out.textContent += `Fetch failed: ${e.message}`; }
}

// ── Auto-reconnect calendar on page load ──
// gToken is in-memory only; if user previously connected, silently re-request
// using prompt:'' so Google re-issues token without showing consent screen.
async function autoReconnectCalendar() {
  if (localStorage.getItem('nexus_cal_connected') !== '1') return;
  if (!isGoogleConfigured()) return;
  // Google scripts load async — wait up to 5s
  for (let i = 0; i < 25; i++) {
    if (typeof gapi !== 'undefined' && typeof google !== 'undefined') break;
    await new Promise(r => setTimeout(r, 200));
  }
  if (typeof gapi === 'undefined' || typeof google === 'undefined') return;
  try {
    await initGapiClient();
    await requestGoogleToken(CONFIG.google.readScopes, '');
    await Promise.all([loadCalendarEvents(), loadTasks().catch(() => null)]);
    renderContent();
  } catch (e) {
    // Token revoked or session expired — clear flag, user will see connect button
    localStorage.removeItem('nexus_cal_connected');
    renderContent();
  }
}

// ── Boot ──
if (checkPat()) { reload(); autoReconnectCalendar(); }
